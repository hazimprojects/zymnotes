name: Update project status

on:
  push:
    branches: [main]
    paths-ignore:
      - 'data/updates.json'
      - 'sitemap.xml'
      - '.github/**'
      - 'scripts/**'

jobs:
  update-status:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 80

      - name: Generate updates.json
        run: python3 scripts/generate-updates.py

      - name: Bump asset versions for changed files
        run: python3 scripts/bump-versions.py --last-commit

      - name: Sync asset versions in HTML and service worker
        run: python3 scripts/sync-asset-versions.py

      - name: Commit if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A
          if ! git diff --staged --quiet; then
            git commit -m "chore: update project status and sitemap"
            git push
          fi
