  <style>
    .error-hero {
      min-height: calc(100dvh - 64px);
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 3rem 1.25rem 4rem;
      position: relative;
      overflow: hidden;
    }

    .error-orb-a {
      position: absolute;
      width: 440px; height: 440px;
      border-radius: 50%;
      background: radial-gradient(circle, rgba(180,220,200,0.26), transparent 68%);
      top: -100px; right: -120px;
      pointer-events: none;
    }
    .error-orb-b {
      position: absolute;
      width: 340px; height: 340px;
      border-radius: 50%;
      background: radial-gradient(circle, rgba(219,196,155,0.2), transparent 68%);
      bottom: -40px; left: -100px;
      pointer-events: none;
    }

    .error-inner {
      position: relative;
      z-index: 1;
      text-align: center;
      max-width: 420px;
    }

    /* ── Illustration ── */
    .error-illustration {
      display: block;
      width: 220px;
      margin: 0 auto 1.6rem;
      animation: float404 4s ease-in-out infinite;
      filter: drop-shadow(0 12px 20px rgba(70,60,40,0.10));
    }
    @keyframes float404 {
      0%, 100% { transform: translateY(0); }
      50%       { transform: translateY(-10px); }
    }

    /* dark mode: invert warm tones */
    [data-theme="dark"] .error-illustration .page-fill    { fill: #2c2a27; }
    [data-theme="dark"] .error-illustration .cover-fill   { fill: #4a3f32; }
    [data-theme="dark"] .error-illustration .spine-fill   { fill: #3a3028; }
    [data-theme="dark"] .error-illustration .line-stroke  { stroke: #3e3a35; }
    [data-theme="dark"] .error-illustration .dash-stroke  { stroke: #3a3530; }
    [data-theme="dark"] .error-illustration .mark-fill    { fill: #6e6258; }
    [data-theme="dark"] .error-illustration .ribbon-fill  { fill: #7a5c40; }
    [data-theme="dark"] .error-illustration .dot-fill     { fill: #5a5248; }
    [data-theme="dark"] .error-illustration .title-bar    { fill: #3e3a35; }
    [data-theme="dark"] .error-illustration .shadow-fill  { fill: rgba(0,0,0,0.18); }
    [data-theme="dark"] .error-illustration .bubble-fill  { fill: #3a3028; }
    [data-theme="dark"] .error-illustration .bubble-mark  { fill: #7a6a58; }

    /* ── Badge + text ── */
    .error-code {
      display: inline-block;
      font-size: 0.72rem;
      font-weight: 900;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: #2f7a67;
      background: rgba(47,122,103,0.08);
      border: 1px solid rgba(47,122,103,0.18);
      border-radius: 999px;
      padding: 0.28rem 0.75rem;
      margin-bottom: 0.9rem;
    }
    .error-title {
      font-size: 1.6rem;
      font-weight: 900;
      line-height: 1.25;
      color: #1e2a34;
      margin: 0 0 0.85rem;
    }
    .error-desc {
      font-size: 0.93rem;
      line-height: 1.72;
      color: #6b5a3e;
      margin: 0 0 2rem;
    }
    .error-actions {
      display: flex;
      flex-wrap: wrap;
      gap: 0.75rem;
      justify-content: center;
    }
    .error-hint {
      margin-top: 2.2rem;
      font-size: 0.75rem;
      color: #a89a8c;
    }

    [data-theme="dark"] .error-title { color: #f0e8da; }
    [data-theme="dark"] .error-desc  { color: #c7baaa; }
    [data-theme="dark"] .error-hint  { color: #6a6058; }
