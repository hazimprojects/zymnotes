      - '[round-pushpin] Anggota Force 136 berjaya mendarat di [Raub, Pahang]{tempat}.'
      - '[handshake_light] Dengan bantuan [Penolong Pegawai Daerah Raub, Yeop Mahidin]{tokoh}, [Gerila Wataniah Pahang]{pertubuhan}
