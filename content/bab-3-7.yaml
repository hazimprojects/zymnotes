description: 'Nota Sejarah Tingkatan 4 Bab 3.7 (Konflik Dunia dan Pendudukan Jepun di Negara Kita): Perjuangan Rakyat Menentang
  Pendudukan Jepun. Ringkasan padat untuk ulang kaji SPM.'
lead: Subtopik ini menjelaskan bagaimana rakyat di negara kita menentang pendudukan Jepun melalui perjuangan bersenjata, perang
  gerila, kerjasama dengan pihak luar dan penentangan individu demi mempertahankan tanah air.
ringkasan:
- '[raised_fist] Rakyat daripada pelbagai kaum dan latar belakang bangkit menentang Jepun melalui perjuangan bersenjata, perang
  gerila, kerjasama dengan pihak luar dan penentangan individu.'
- '[military-helmet] Di [Tanah Melayu]{tempat}, perjuangan digerakkan oleh [Rejimen Askar Melayu]{pertubuhan}, [MPAJA]{pertubuhan},
  [Force 136]{pertubuhan} dan gerila lain.'
- '[person] Penentangan individu pula dapat dilihat melalui keberanian [Gurchan Singh]{tokoh} dan [Sybil Kathigasu]{tokoh}.'
- '[ant] Di [Sarawak]{tempat} dan [Sabah]{tempat}, penentangan terserlah melalui [Operasi Semut]{peristiwa} dan [Pemberontakan
  Jesselton]{peristiwa}.'
soalan_utama:
  soalan: Bagaimanakah rakyat di negara kita menentang pendudukan Jepun semasa Perang Dunia Kedua?
  heading: Bagaimanakah rakyat di negara kita menentang pendudukan Jepun semasa Perang Dunia Kedua?
  jawapan:
  - '[light_bulb] Rakyat daripada pelbagai kaum dan latar belakang bangkit menentang Jepun melalui perjuangan bersenjata,
    gerila, kerjasama dengan pihak luar dan penentangan individu demi mempertahankan tanah air.'
  - '[pushpin] Semasa pendudukan Jepun, tentera Jepun bertindak kejam, rakyat [Tanah Melayu]{tempat}, [Sarawak]{tempat} dan
    [Sabah]{tempat} menderita, tetapi semangat perjuangan rakyat tetap tidak luntur.'
  - '[pushpin] Penentangan dilakukan oleh askar, gerila, pemimpin tempatan dan individu yang berani.'
fokus: 'Rakyat menentang pendudukan Jepun melalui pelbagai saluran. Lima bentuk perjuangan:'
