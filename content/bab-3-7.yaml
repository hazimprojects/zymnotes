      - '[round-pushpin] Anggota Force 136 berjaya mendarat di [Kampung Kuala Janing, Kedah]{tempat}.'
      - '[handshake_light] Dengan bantuan [Pegawai Daerah Kedah]{tokoh} dan [Tunku Abdul Rahman]{tokoh}, [Gerila Melayu Kedah]{pertubuhan}
