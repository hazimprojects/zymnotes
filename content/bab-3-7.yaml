    - tajuk: Tengku Mahmood Mahyiddeen
      senarai:
      - '[pushpin] [Tengku Mahmood Mahyiddeen]{tokoh} ialah pemimpin pasukan Melayu [Force 136]{pertubuhan}.'
      - '[pushpin] Beliau menerima jolokan [“Harimau Malaya”]{karya} kerana mengelolakan siaran radio dari [India]{tempat}
