- tajuk: Penentangan Individu
  label: Bahagian Keenam
  desc: ''
  kandungan:
  - jenis: accordion
    items:
    - tajuk: Gurchan Singh
      senarai:
      - '[pushpin] Kegiatan anti-Jepun turut digerakkan secara individu seperti oleh [Gurchan Singh]{tokoh}.'
      - '[pushpin] Beliau menentang pendudukan tentera Jepun dengan cara menyebarkan risalah dan propaganda menggunakan nama
        samaran [“Lion of Malaya”]{karya}.'
      - '[pushpin] Risalah penentangan yang dihasilkannya diedarkan secara teratur dan berkesan untuk memberitahu penduduk
        tentang fakta sebenar perang dan pendudukan tentera Jepun.'
      - '[pushpin] Beliau ditangkap oleh [Kempeitai]{pertubuhan} selepas dikhianati, namun berjaya melarikan diri ke [Burma]{tempat}
        sehingga perang tamat.'
      - '[newspaper] menyebarkan risalah anti-Jepun sebagai “Lion of Malaya”'
      - '[detective] menyamar sebagai wartawan dalam sidang akhbar tentera Jepun'
      - '[bomb] mendalangi sabotaj terhadap landasan kereta api yang menjejaskan pengangkutan tentera Jepun'
    - tajuk: Sybil Kathigasu
      senarai:
      - '[pushpin] [Sybil Kathigasu]{tokoh} atau Sybil Medan Daly ialah seorang jururawat yang terkenal dengan keberanian
        dan kecekalan membantu mangsa perang serta gerila anti-Jepun di Perak.'
      - '[pushpin] Sybil dan suaminya, [Dr. Abdon Clement Kathigasu]{tokoh}, mengendalikan sebuah klinik di [Ipoh]{tempat}
        sebelum perang sehingga kedatangan Jepun.'
      - '[pushpin] Semasa pendudukan Jepun, pasangan ini memberikan bantuan ubat-ubatan dan perkhidmatan perubatan kepada
        gerila anti-Jepun.'
      - '[pushpin] Sybil dan suaminya ditangkap oleh tentera Jepun apabila kegiatan mereka terbongkar.'
      - '[pushpin] Semasa berada dalam tahanan, penyeksaan demi penyeksaan dilakukan oleh tentera Jepun sehingga menyebabkan
        kematian suaminya.'
      - '[pushpin] Selepas tentera Jepun menyerah kalah, Sybil dibebaskan dan diterbangkan ke [Britain]{tempat} untuk menerima
        rawatan perubatan.'
      - '[sports-medal] Sybil Kathigasu dianugerahi [Pingat King George VI]{peristiwa} di Istana Buckingham oleh Raja George
        VI kerana keberaniannya semasa pendudukan Jepun dan merupakan wanita dari Tanah Melayu yang menerima anugerah tersebut.'
      - '[pill] membantu gerila dengan rawatan perubatan'
      - '[radio] menyembunyikan radio'
      - '[loudspeaker] berkongsi maklumat daripada siaran radio British dengan gerila anti-Jepun'
- tajuk: Gerakan Anti-Jepun di Sarawak dan Sabah
  label: Bahagian Ketujuh
  desc: ''
  kandungan:
  - jenis: board
    tajuk: Kawasan Operasi Semut
    strip: true
    senarai:
    - '[pushpin] Semut I → Bario hingga Belait dan Trusan'
    - '[pushpin] Semut II → Baram, Tutong, Marudi dan Brunei'
    - '[pushpin] Semut III → Sungai Rajang'
    - '[pushpin] Semut IV → Bintulu dan Mukah'
  - jenis: board
    tajuk: Info
    strip: true
    senarai:
    - '[pushpin] [Jesselton]{tempat} kini dikenali sebagai [Kota Kinabalu]{tempat}.'
  - jenis: accordion
    items:
    - tajuk: Operasi Semut
      senarai:
      - '[light_bulb] [Operasi Semut]{peristiwa} ialah siri operasi peninjauan yang dilakukan oleh [Unit Khas Z Australia]{pertubuhan}
        sebagai sebahagian daripada kempen tentera Bersekutu menentang Jepun di Sarawak.'
      - '[pushpin] Operasi tersebut dilaksanakan oleh [Jabatan Peninjauan Perkhidmatan Australia]{pertubuhan} atau [Australian
        Services Reconnaissance Department (SRD)]{pertubuhan} untuk mengumpulkan risikan dan melatih orang tempatan melancarkan
        perang gerila melawan Jepun.'
      - '[calendar] Pada bulan [Mei 1945]{tahun}, anggota SRD mendarat di kawasan tengah dan timur laut Sarawak untuk mengatur
        penentangan terhadap tentera Jepun dan membuat persediaan bagi pendaratan pasukan Bersekutu.'
      - '[pushpin] Anggota ini terdiri daripada tentera Australia, British dan New Zealand.'
      - '[pushpin] Rekrut tempatan yang dikenali sebagai gerila Semut antaranya diambil daripada orang:'
      - '[light_bulb] Kepakaran gerila Semut penting dalam usaha merancang taktikal perang gerila menentang tentera Jepun
        kerana sebagai penduduk tempatan, mereka mengetahui selok-belok bumi Sarawak.'
      - '[busts-in-silhouette] Kayan'
      - '[busts-in-silhouette] Kenyah'
      - '[busts-in-silhouette] Kelabit'
      - '[busts-in-silhouette] Murut'
      - '[busts-in-silhouette] Iban'
    - tajuk: Pemberontakan Jesselton (Double Tenth)
      senarai:
      - '[pushpin] [Pemberontakan Jesselton]{peristiwa} juga dikenali sebagai [pemberontakan Double Tenth]{peristiwa}, iaitu
        penentangan terhadap pendudukan tentera Jepun di Sabah yang diketuai oleh [Albert Kwok]{tokoh}.'
      - '[calendar] Pada bulan [Oktober 1943]{tahun}, kumpulan Albert Kwok yang dikenali sebagai gerila Kinabalu melancarkan
        serangan terhadap Jepun.'
      - '[pushpin] Tentera Jepun kemudian melancarkan serangan balas dengan pantas dan kejam.'
      - '[pushpin] Perkampungan di pesisiran pantai diserang dan dibom. Beratus-ratus orang disoal siasat dan diseksa sehingga
        mati dalam usaha mencari pemimpin dan anggota pemberontak.'
      - '[calendar] Pada bulan [Disember 1943]{tahun}, [Albert Kwok]{tokoh} menyerah diri dengan harapan dapat menamatkan
        serangan balas tentera Jepun terhadap orang awam.'
      - '[pushpin] Beliau bersama [175]{tahun} orang lain kemudiannya dihukum bunuh di [Petagas]{tempat}, manakala [131]{tahun}
        orang lagi dipenjarakan di [Labuan]{tempat}.'
      - '[pushpin] Selain itu, terdapat pasukan gerila anti-Jepun yang dipimpin oleh [Datu Mustapha Datu Harun]{tokoh}.'
      - '[pushpin] [Jesselton]{tempat} kini dikenali sebagai [Kota Kinabalu]{tempat}.'
      - '[office-building] pejabat pentadbiran Jepun'
      - '[oncoming-police-car] balai polis'
      - '[military-helmet] kemudahan tentera Diraja Jepun'
kesimpulan:
- '[pushpin] Perjuangan rakyat menentang Jepun memperlihatkan:'
- '[pushpin] Rakyat menentang Jepun melalui:'
- '[light_bulb] Semua bentuk perjuangan ini bukan sahaja melemahkan penguasaan Jepun, malah menyemai semangat kebangsaan yang
  semakin kuat dalam kalangan rakyat.'
- '[triangular-flag] Perjuangan tersebut akhirnya menjadi antara asas penting yang mempercepatkan gerakan ke arah kemerdekaan
  negara.'
- '[crossed_swords] keberanian yang luar biasa'
- '[handshake_light] kerjasama merentas kaum'
- '[hibiscus] semangat nasionalisme yang tinggi'
