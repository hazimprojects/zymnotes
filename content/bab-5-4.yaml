lead: Subtopik ini menerangkan kesan penubuhan [Persekutuan Tanah Melayu 1948]{pentadbiran} terhadap politik, kedudukan orang
  Melayu, kewarganegaraan dan hubungan antara kaum.
ringkasan:
- '[crown] [Persekutuan Tanah Melayu 1948]{pentadbiran} berjaya mengembalikan kedudukan [Raja-raja Melayu]{tokoh} yang terjejas
  semasa [Malayan Union]{pentadbiran}.'
- '[shield] Persekutuan ini turut menjaga [kedudukan istimewa orang Melayu]{istilah} sambil mengiktiraf [kepentingan sah kaum
  lain]{istilah}.'
- '[identification-card] Penubuhannya membuka ruang [kewarganegaraan]{istilah} kepada orang bukan Melayu dalam kerangka politik
  yang lebih tersusun.'
- '[handshake_light] Ia juga membuka jalan ke arah [kerjasama kaum]{istilah} melalui [Jawatankuasa Hubungan Antara Kaum (CLC)]{pertubuhan}
  dan menjadi asas penting kepada kemerdekaan negara.'
soalan_utama:
  soalan: Apakah kesan penubuhan Persekutuan Tanah Melayu 1948 terhadap politik, kedudukan orang Melayu dan hubungan antara
    kaum?
  heading: Apakah kesan penubuhan Persekutuan Tanah Melayu 1948 terhadap politik, kedudukan orang Melayu dan hubungan antara
    kaum?
  jawapan:
  - '[light_bulb] [Persekutuan Tanah Melayu 1948]{pentadbiran} membawa kesan besar kepada negara kita kerana berjaya mengembalikan
    kedudukan [Raja-raja Melayu]{tokoh}, menjaga kedudukan istimewa orang Melayu, membuka ruang kewarganegaraan dan mewujudkan
    kerjasama antara kaum.'
  - '[pushpin] Kesan ini menunjukkan bahawa [Persekutuan Tanah Melayu 1948]{pentadbiran} bukan sekadar menggantikan [Malayan
    Union]{pentadbiran}, tetapi menjadi asas penting kepada pembinaan negara yang lebih stabil dan tersusun.'
