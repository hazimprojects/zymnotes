kesimpulan:
- '[pushpin] Penubuhan [Persekutuan Tanah Melayu 1948]{pentadbiran} membawa kesan yang besar kepada negara kita kerana:'
- '[pushpin] Perjanjian ini menunjukkan bahawa kestabilan negara hanya dapat dicapai melalui:'
- '[light_bulb] Oleh itu, gabungan kuat antara rakyat, pemimpin dan institusi Raja berjaya menggagalkan rancangan British
  yang boleh melemahkan kedudukan orang Melayu dan mengubah struktur politik [Tanah Melayu]{tempat} secara tidak adil.'
- '[crown] mengembalikan kedudukan [Raja-raja Melayu]{tokoh}'
- '[shield] menjaga kedudukan istimewa orang Melayu'
- '[identification-card] membuka ruang kewarganegaraan kepada orang bukan Melayu'
- '[handshake_light] mewujudkan kerjasama dan perpaduan antara kaum'
