description: 'Nota Sejarah Tingkatan 4 Bab 3.6 (Konflik Dunia dan Pendudukan Jepun di Negara Kita): Dasar Pendudukan Jepun
  di Negara Kita. Ringkasan padat untuk ulang kaji SPM.'
lead: Subtopik ini menerangkan bagaimana Jepun mentadbir dan mengawal negara kita semasa pendudukan melalui [dasar pentadbiran]{istilah},
  [dasar ekonomi]{istilah} dan [dasar sosial]{istilah} untuk mengukuhkan kekuasaannya serta menyokong kepentingan perang.
ringkasan:
- '[classical_building] Jepun mentadbir negara kita melalui tiga dasar utama, iaitu [dasar pentadbiran]{istilah}, [dasar ekonomi]{istilah}
  dan [dasar sosial]{istilah}.'
- '[crown] Dalam pentadbiran, Jepun mengekalkan Raja-raja Melayu dan menggunakan pemimpin tempatan, tetapi semuanya berada
  di bawah pengawasan tentera Jepun.'
- '[yen-banknote] Dalam ekonomi, Jepun memperkenalkan ekonomi kawalan dan mata wang Jepun yang dikenali sebagai [wang pokok
  pisang]{istilah}; pencetakan tanpa kawalan menyebabkan inflasi dan kekurangan barang di pasaran.'
- '[skull] Dalam sosial, rakyat berdepan perubahan pendidikan, catuan makanan, layanan berbeza mengikut kaum dan kekejaman
  seperti [Landasan Kereta Api Maut]{peristiwa}.'
soalan_utama:
  soalan: Bagaimanakah Jepun mentadbir dan mengawal negara kita semasa pendudukan Jepun?
  heading: Bagaimanakah Jepun mentadbir dan mengawal negara kita semasa pendudukan Jepun?
  jawapan:
  - '[light_bulb] Jepun melaksanakan pemerintahan tentera yang keras melalui dasar pentadbiran, ekonomi dan sosial untuk mengukuhkan
    kekuasaannya serta menyokong kepentingan perang.'
  - '[pushpin] Selepas menawan negara kita, Jepun meletakkan [Tanah Melayu]{tempat}, [Sarawak]{tempat} dan [Sabah]{tempat}
    di bawah jajahan tentera Jepun.'
  - '[pushpin] Pentadbiran ini dikendalikan oleh [Panglima Agung Tentera Jepun (Southern Army)]{pertubuhan}.'
fokus: '1941–1945: dasar Jepun ubah kehidupan rakyat. Tiga dasar utama:'
