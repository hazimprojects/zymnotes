lead: Subtopik ini menerangkan kesan [zaman darurat]{istilah} terhadap negara kita dari aspek [politik]{istilah} dan [sosioekonomi]{istilah},
  serta bagaimana peristiwa darurat turut mempercepat usaha ke arah [rundingan kemerdekaan]{peristiwa}.
ringkasan:
- '[classical_building] [Zaman darurat]{istilah} memberikan kesan jangka panjang kepada negara kita, khususnya dalam aspek
  [politik]{istilah} dan [sosioekonomi]{istilah}.'
- '[identification-card] Darurat membawa kesan politik seperti peningkatan jumlah warganegara, penubuhan [Malayan Chinese
  Association (MCA)]{pertubuhan} dan mempercepat kemerdekaan.'
- '[money-with-wings] Dari sudut sosioekonomi, darurat meningkatkan kos perbelanjaan, menyebabkan penderitaan rakyat, merenggangkan
  hubungan kaum dan mengorbankan banyak nyawa.'
- '[dove] [Darurat]{istilah} akhirnya tamat pada [31 Julai 1960]{masa} selepas berlangsung selama [12 tahun]{istilah} di negara
  kita.'
soalan_utama:
  soalan: Apakah kesan zaman darurat terhadap negara kita dari aspek politik dan sosioekonomi?
  heading: Apakah kesan zaman darurat terhadap negara kita dari aspek politik dan sosioekonomi?
  jawapan:
  - '[light_bulb] [Zaman darurat]{istilah} memberikan kesan jangka panjang terhadap negara kita, khususnya dalam aspek politik
    dan sosioekonomi.'
  - '[pushpin] Peristiwa darurat juga mempercepat usaha ke arah [rundingan kemerdekaan]{peristiwa}.'
