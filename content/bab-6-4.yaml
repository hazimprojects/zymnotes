  - jenis: accordion
    items:
    - tajuk: Peningkatan Jumlah Warganegara
      senarai:
      - '[pushpin] Kesan daripada kelonggaran ini:'
      - '[light_bulb] Kelonggaran syarat ini menunjukkan pengorbanan orang Melayu terhadap kaum lain demi mewujudkan perpaduan
        rakyat.'
      - '[calendar] [1952]{masa} → kerajaan melonggarkan syarat kewarganegaraan'
    - tajuk: Penubuhan Malayan Chinese Association (MCA)
      senarai:
      - '[pushpin] Zaman darurat mendorong [Sir Henry Gurney]{tokoh} mengambil langkah menawan hati penduduk Cina dengan menggalakkan
        penubuhan parti politik yang berorientasikan tempatan.'
      - '[pushpin] Penubuhan MCA penting kerana:'
      - '[pushpin] Sumbangan MCA kepada kerajaan dan rakyat:'
      - '[pushpin] Selain itu, MCA turut menjalankan:'
      - '[pushpin] Hasil kutipan tersebut didermakan kepada penduduk di [Kampung Baru]{tempat}.'
      - '[calendar] [27 Februari 1949]{masa}'
      - '[round-pushpin] [Kuala Lumpur]{tempat}'
      - '[right-arrow] [Tan Cheng Lock]{tokoh} menubuhkan [Malayan Chinese Association (MCA)]{pertubuhan}'
    - tajuk: Mempercepat Kemerdekaan
      senarai:
      - '[pushpin] British sedar bahawa darurat tidak dapat ditamatkan melalui strategi ketenteraan semata-mata.'
      - '[light_bulb] Oleh itu, darurat menjadi faktor yang mendorong British mempercepat kemerdekaan [Persekutuan Tanah Melayu]{pentadbiran}.'
      - '[pushpin] Penubuhan [Jawatankuasa Hubungan Antara Kaum (CLC)]{pertubuhan} meningkatkan kesedaran politik dalam kalangan
        pemimpin pelbagai kaum bahawa mereka boleh berkongsi:'
      - '[pushpin] Kesedaran ini membawa kepada penubuhan:'
      - '[pushpin] Kemenangan ini meyakinkan British bahawa [Persekutuan Tanah Melayu]{pentadbiran} dapat menewaskan komunis
        melalui perpaduan rakyat berbilang kaum.'
      - '[light_bulb] Dalam suasana inilah British bersetuju memberikan kemerdekaan kepada [Persekutuan Tanah Melayu]{pentadbiran}.'
      - '[pushpin] Dengan itu, [PKM]{pertubuhan} tidak lagi mempunyai alasan untuk meneruskan perjuangannya.'
      - '[handshake_light] kepentingan bersama'
      - '[compass] hala tuju yang sama'
