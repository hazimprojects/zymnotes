lead: Subtopik ini menerangkan bagaimana [nasionalisme]{gerakan} mula berkembang di [Tanah Melayu]{tempat} sebelum tercetusnya
  perang dunia. Perkembangan ini bermula daripada penentangan terhadap campur tangan [British]{tempat}, dipengaruhi oleh gerakan
  Islam antarabangsa, dan diteruskan secara bijaksana melalui penulisan serta penerbitan.
ringkasan:
- '[hibiscus] [Nasionalisme]{gerakan} di negara kita berkembang daripada penentangan orang Melayu terhadap campur tangan [British]{tempat}.'
- '[mosque] Perkembangannya turut dipengaruhi oleh semangat [Pan-Islamisme]{gerakan} dan kebangkitan [Empayar Uthmaniyah]{tempat}.'
- '[writing-hand] Apabila penentangan terbuka ditekan, masyarakat Melayu menukar strategi kepada [penulisan]{istilah} dan
  [penerbitan]{istilah}.'
- '[dove] Idea nasionalisme kemudian disampaikan secara [simbolik]{istilah}, berlapik dan tersirat melalui akhbar serta karya
  kreatif.'
