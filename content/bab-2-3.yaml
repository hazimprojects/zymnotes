      - '[pushpin] Selepas [Perang Dunia Pertama]{peristiwa}, [Mahatma Gandhi]{tokoh} mengetuai dasar tidak bekerjasama.'
      - '[open_book] Pegangan beliau: [Satyagraha]{istilah} = berpegang teguh kepada kebenaran, menolak keganasan.'
      - '[person] [Bal Gangadhar Tilak]{tokoh}'
      - '[person] [Bipin Chandra Pal]{tokoh}'
