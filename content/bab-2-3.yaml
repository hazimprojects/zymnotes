description: 'Nota Sejarah Tingkatan 4 Bab 2.3 (Kebangkitan Nasionalisme): Perkembangan Nasionalisme di Asia. Ringkasan padat
  untuk ulang kaji SPM.'
lead: Subtopik ini menerangkan bagaimana idea [nasionalisme]{istilah} di [Asia]{tempat} berkembang sebagai kesinambungan daripada
  pengaruh Barat, khususnya selepas pertembungan dengan kuasa [Eropah]{tempat}. Tekanan penjajahan mendorong rakyat Asia bangkit
  mempertahankan maruah, identiti dan masa depan bangsa mereka.
ringkasan:
- '[globe] Perkembangan [nasionalisme]{istilah} di [Asia]{tempat} ialah kesinambungan idea dari Barat selepas pertembungan
  dengan kuasa [Eropah]{tempat}.'
- '[loudspeaker] Penjajahan mendorong rakyat Asia bangkit menuntut kemerdekaan dan mempertahankan jati diri bangsa.'
- '[compass] Gerakan ini berkembang dalam pelbagai bentuk seperti penentangan langsung, gerakan pembaharuan agama, penubuhan
  pertubuhan politik dan usaha pemodenan negara.'
- '[fire] Antara contoh utama perkembangan nasionalisme di Asia ialah di [India]{tempat}, [China]{tempat}, [Empayar Uthmaniyah
  dan Mesir]{tempat} serta [Jepun]{tempat}.'
soalan_utama:
  soalan: Bagaimana semangat nasionalisme sampai ke Asia?
  heading: Bagaimana semangat nasionalisme sampai ke Asia?
  jawapan:
  - '[light_bulb] Perkembangan [nasionalisme]{istilah} di [Asia]{tempat} ialah kesinambungan idea dari Barat, terutama selepas
    pertembungan dengan kuasa [Eropah]{tempat}.'
  - '[loudspeaker] Penjajahan mendorong rakyat Asia untuk bangkit menuntut kemerdekaan dan mempertahankan jati diri bangsa.'
fokus: 'Nasionalisme juga berkembang di Asia (abad ke-19 – awal ke-20), bukan hanya di Barat. Empat wilayah:'
