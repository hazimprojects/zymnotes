- tajuk: Pendapat tokoh terkenal tentang nasionalisme
  label: Bahagian Kedua
  desc: Setiap tokoh memberikan pandangan berdasarkan konteks masyarakat dan zamannya. Klik setiap tokoh untuk membaca pandangannya.
  kandungan:
  - jenis: accordion
    items:
    - tajuk: Hans Kohn
      senarai:
      - '[speech_left] "Nasionalisme merupakan satu gerakan yang meletakkan kesetiaan seseorang hanya kepada negara atau bangsanya."'
      - '[magnify_right] Intipati: [Nasionalisme]{istilah} ialah kesetiaan sepenuhnya kepada negara dan tanah air.'
    - tajuk: Profesor William R. Roff
      senarai:
      - '[speech_left] "Kebangkitan nasionalisme Melayu berlaku kerana ancaman terhadap hak dan ekonomi orang Melayu, serta
        kebimbangan terhadap sekularisme dan imperialisme Barat."'
      - '[pushpin] Intipati: [Nasionalisme]{istilah} timbul akibat tekanan luar dan keperluan mempertahankan identiti.'
    - tajuk: Dato' Onn Jaafar
      senarai:
      - '[speech_left] "Kita hendak menzahirkan suatu bangsa yang tegap, kuat, berdikari dan setanding dengan bangsa lain."'
      - '[megaphone] Intipati: [Nasionalisme]{istilah} membina jati diri dan keyakinan bangsa.'
    - tajuk: Dr. Burhanuddin al-Helmi
      senarai:
      - '[speech_left] "Perjuangan mesti dilakukan dengan persatuan, tatatertib dan adab sopan, demi menebus kembali hak mutlak
        bangsa."'
      - '[raised_fist] Intipati: [Nasionalisme]{istilah} mesti disertai akhlak, tatatertib dan perpaduan.'
    - tajuk: Dr. R. Suntharalingam
      senarai:
      - '[speech_left] "Nasionalisme ialah fenomena sejagat — setiap bangsa berhak membentuk negara dan memindahkan kedaulatan
        kepada rakyat."'
      - '[classical_building] Intipati: Setiap bangsa mempunyai hak untuk merdeka dan mentadbir sendiri.'
    - tajuk: Profesor Datuk Zainal Abidin Abdul Wahid
      senarai:
      - '[speech_left] "Nasionalisme Melayu telah wujud sejak Kesultanan Melayu Melaka — dengan kesetiaan kepada raja sebagai
        ciri utama."'
      - '[crown] Intipati: Nasionalisme Melayu berkait dengan cinta tanah air dan kesetiaan kepada institusi raja.'
    - tajuk: Profesor Emeritus Tan Sri Dr. Khoo Kay Kim
      senarai:
      - '[speech_left] "Nasionalisme sebelum merdeka ialah perjuangan orang Melayu untuk mendapatkan kembali kedudukan unggul
        dalam negara sendiri."'
      - '[pushpin] Intipati: [Nasionalisme]{istilah} ialah usaha mengembalikan maruah dan kedudukan bangsa.'
