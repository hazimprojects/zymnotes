lead: Subtopik ini menjelaskan maksud [nasionalisme]{istilah} serta bagaimana idea ini difahami melalui pandangan beberapa
  [tokoh]{tokoh} dan sejarawan. Pemahaman terhadap nasionalisme penting kerana ia menjadi asas kepada semangat perjuangan
  bangsa dan negara.
ringkasan:
- '[red_heart] [Nasionalisme]{istilah} ialah perasaan cinta yang mendalam terhadap bangsa dan negara.'
- '[crossed_swords] Nasionalisme mendorong perjuangan untuk menentang penjajahan, membela bangsa dan tanah air serta mencapai
  kebebasan.'
- '[brain] Maksud nasionalisme tidak statik, sebaliknya berbeza mengikut keturunan, agama, bahasa, adat resam dan pengalaman
  sejarah.'
- '[person] Beberapa [tokoh]{tokoh} dan sejarawan memberikan tafsiran yang berbeza mengikut konteks masyarakat dan zamannya.'
soalan_utama:
  soalan: Apa itu nasionalisme? Kenapa penting kita memahaminya?
  heading: Nasionalisme ialah perasaan cinta yang mendalam terhadap bangsa dan negara.
  jawapan:
  - '[light_bulb] [Nasionalisme]{istilah} ialah perasaan cinta yang mendalam terhadap bangsa dan negara.'
  - '[light_bulb] Pemahaman terhadap nasionalisme penting kerana semangat ini mendorong rakyat untuk mempertahankan hak, menolak
    penjajahan dan membina negara yang berdaulat.'
fokus: 'Nasionalisme: kesedaran mempertahankan dan membebaskan bangsa daripada kuasa asing. Definisi, faktor makna, pandangan
  tokoh, matlamat:'
