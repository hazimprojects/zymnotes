- '[scroll_old] Antara ciri utama [negara bangsa]{istilah} ialah [raja]{tokoh}, [undang-undang]{konsep}, [wilayah pengaruh]{tempat}
  dan [rakyat]{istilah}.'
- '[scales] [Kesultanan Melayu Melaka]{kerajaan} mengukuhkan warisan ini melalui sistem [pentadbiran]{konsep} dan [perundangan]{konsep}
  yang unggul.'
- '[handshake_light] Hubungan timbal balik antara [pemerintah]{tokoh} dan [rakyat]{istilah} menjadi warisan penting yang kekal
  bernilai hingga kini.'
