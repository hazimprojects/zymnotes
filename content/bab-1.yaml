sinopsis:
- '[classical_building] Kerajaan [Alam Melayu]{tempat} sudah mempunyai ciri [negara bangsa]{istilah} sebelum kedatangan Barat.'
- '[counterclockwise-arrows-button] Ciri ini diwarisi daripada [Funan]{kerajaan} dan [Champa]{kerajaan}, kemudian diteruskan
