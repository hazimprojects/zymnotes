lead: Subtopik ini menerangkan bahawa kesedaran [nasionalisme]{istilah} di negara kita tidak bermula hanya pada zaman penjajahan
  [British]{tempat}, tetapi telah dapat dikesan sejak zaman [Kesultanan Melayu Melaka]{tempat} lagi. Kesedaran ini berkembang
  melalui perjuangan sultan, tokoh tempatan, gerakan agama, penulisan dan pertubuhan.
ringkasan:
- '[crown] Kesedaran [nasionalisme]{istilah} di negara kita telah bermula sejak zaman [Kesultanan Melayu Melaka]{tempat}.'
- '[crossed_swords] Perjuangan awal dapat dilihat melalui usaha sultan dan tokoh tempatan mempertahankan wilayah daripada
  kuasa asing.'
- '[mosque] Pada abad ke-20, kesedaran ini berkembang melalui [Gerakan Islah]{gerakan}, penulisan, akhbar dan pertubuhan.'
- '[hibiscus] Kesedaran inilah yang akhirnya menjadi asas kepada perjuangan kebangsaan dan kemerdekaan negara.'
soalan_utama:
  soalan: Bilakah semangat nasionalisme sebenarnya bermula di tanah air kita? Adakah hanya semasa zaman penjajahan British?
  heading: Bilakah semangat nasionalisme sebenarnya bermula di tanah air kita? Adakah hanya semasa zaman penjajahan British?
  jawapan:
  - '[light_bulb] Sebenarnya, kesedaran [nasionalisme]{istilah} di negara kita telah mula muncul sejak zaman [Kesultanan Melayu
    Melaka]{tempat} lagi.'
fokus: 'Penentangan penjajahan di Tanah Melayu bermula seawal Melaka. Lima peringkat nasionalisme Melayu:'
