lead: Subtopik ini menerangkan maksud [Sistem Ahli]{istilah}, bagaimana sistem ini dibentuk, ciri-ciri utamanya dan kepentingannya
  sebagai langkah awal melatih penduduk tempatan mentadbir [Persekutuan Tanah Melayu]{pentadbiran} ke arah [kemerdekaan]{perjanjian}.
ringkasan:
- '[light_bulb] Selepas [Perang Dunia Kedua]{peristiwa}, British menjalankan dasar [dekolonisasi]{gerakan} dengan menyediakan
  langkah ke arah [berkerajaan sendiri]{perjanjian} secara beransur-ansur.'
- '[classical_building] Kekurangan pegawai tempatan dalam perkhidmatan kerajaan mendorong [Dato’ Onn Jaafar]{tokoh} meminta
  lebih banyak peluang pentadbiran diberikan kepada wakil tempatan.'
- '[man-office-worker] Cadangan ini membawa kepada pembentukan [Sistem Ahli]{istilah}, iaitu sistem latihan awal yang membolehkan
  penduduk tempatan belajar mentadbir kerajaan sebelum kemerdekaan dicapai.'
soalan_utama:
  soalan: Apakah Sistem Ahli dan apakah kepentingannya ke arah kemerdekaan Tanah Melayu?
  heading: Apakah Sistem Ahli dan apakah kepentingannya ke arah kemerdekaan Tanah Melayu?
  jawapan:
  - '[light_bulb] Sistem Ahli ialah satu sistem yang melatih penduduk tempatan untuk menerajui pentadbiran Persekutuan Tanah
    Melayu sebelum British memberikan kemerdekaan.'
  - '[pushpin] Sistem ini penting kerana memberi pengalaman mentadbir, memupuk perpaduan kaum dan menyediakan asas ke arah
    berkerajaan sendiri serta kemerdekaan.'
