      - '[right-arrow] [CLC]{pertubuhan} bersetuju:'
      - '[light_bulb] Kesan:'
      - '[check-mark] orang Melayu mempunyai kedudukan istimewa'
      - '[check-mark] kerana taat setia tidak berbelah bahagi'
    - tajuk: Kedudukan Ekonomi Orang Melayu
      senarai:
      - '[pushpin] Orang Melayu ketinggalan dalam sektor ekonomi.'
      - '[right-arrow] [CLC]{pertubuhan} mencadangkan:'
      - '[light_bulb] Kesan:'
      - '[pushpin] Cadangan ini datang daripada:'
      - '[light_bulb] Tujuan:'
      - '[office-building] penubuhan agensi untuk meningkatkan ekonomi dan pendidikan'
    - tajuk: Kewarganegaraan Bukan Melayu
      senarai:
      - '[pushpin] Orang Melayu tegas dalam isu kewarganegaraan.'
      - '[right-arrow] [CLC]{pertubuhan} bersetuju:'
      - '[light_bulb] Kesan:'
      - '[check-mark] kewarganegaraan penting untuk memupuk taat setia'
    - tajuk: Pendidikan
      senarai:
