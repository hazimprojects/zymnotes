lead: Subtopik ini menerangkan bagaimana [nasionalisme]{istilah} berkembang di [Asia Tenggara]{tempat} sebagai tindak balas
  terhadap penjajahan Barat. Gerakan ini muncul untuk membebaskan negara daripada penjajahan, mempertahankan kedaulatan dan
  membina identiti bangsa.
ringkasan:
- '[globe] Di [Asia Tenggara]{tempat}, semangat [nasionalisme]{istilah} muncul akibat penjajahan Barat.'
- '[crossed_swords] Gerakan ini bertujuan membebaskan negara daripada penjajahan, mempertahankan kedaulatan dan membina jati
  diri bangsa.'
- '[round-pushpin] Perkembangan nasionalisme dapat dilihat di [Filipina]{tempat}, [Burma]{tempat}, [Vietnam]{tempat} dan [Indonesia]{tempat}.'
- '[shield] [Thailand]{tempat} pula melaksanakan pembaharuan untuk mengekalkan kemerdekaannya daripada penjajahan Barat.'
soalan_utama:
  soalan: Bagaimana nasionalisme muncul di Asia Tenggara?
  heading: Bagaimana nasionalisme muncul di Asia Tenggara?
  jawapan:
  - '[light_bulb] Di rantau [Asia Tenggara]{tempat}, semangat [nasionalisme]{istilah} muncul akibat penjajahan Barat.'
  - '[pushpin] Gerakan ini bertujuan untuk:'
  - '[crossed_swords] Membebaskan negara daripada penjajahan'
  - '[shield] Mempertahankan kedaulatan negara'
  - '[compass] Membina identiti dan jati diri bangsa'
fokus: 'Di Asia Tenggara, nasionalisme bangkit menentang penjajahan Barat (abad ke-19). Lima negara:'
bahagian:
- tajuk: Nasionalisme di Filipina
  label: Bahagian Pertama
  desc: ''
  kandungan:
  - jenis: board
    tajuk: ''
    strip: false
    senarai:
    - '[person] [José Rizal]{tokoh}'
    - '[person] [Andres Bonifacio]{tokoh}'
    - '[person] [Emilio Aguinaldo]{tokoh}'
  - jenis: accordion
    items:
    - tajuk: Gerakan Propaganda
      senarai:
      - '[brain] Gerakan ini dipimpin oleh [José Rizal]{tokoh}.'
      - '[bullseye] [Rizal]{tokoh} menubuhkan [Liga Filipina]{pertubuhan} pada [1892]{tahun} untuk menuntut perubahan politik,
        ekonomi dan sosial.'
      - '[warning] Namun usaha ini tidak berjaya.'
      - '[scales] Filipina dijadikan sebahagian wilayah Sepanyol'
      - '[busts-in-silhouette] Hak yang sama diberikan kepada rakyat Filipina seperti rakyat Sepanyol'
    - tajuk: Gerakan Katipunan & Revolusi 1896
      senarai:
      - '[loudspeaker] Kegagalan Gerakan Propaganda membawa kepada gerakan radikal.'
      - '[pushpin] [Andres Bonifacio]{tokoh} menubuhkan [Katipunan]{pertubuhan}, sebuah gerakan revolusi rahsia.'
      - '[page-facing-up] Akhbar [Kalayan]{karya} digunakan untuk menyebarkan idea revolusi.'
      - '[crossed_swords] Pada [1896]{tahun}, [Bonifacio]{tokoh} dan [Aguinaldo]{tokoh} melancarkan [Revolusi Filipina]{peristiwa}.'
      - '[right-arrow] Namun, konflik dalaman menyebabkan usaha mereka gagal.'
    - tajuk: Kerjasama dengan Amerika & penjajahan baharu
      senarai:
      - '[pushpin] [Aguinaldo]{tokoh} bekerjasama dengan [Amerika Syarikat]{tempat} dan berjaya mengusir Sepanyol.'
      - '[tear-off-calendar] Pada [1899]{tahun}, [Aguinaldo]{tokoh} mengisytiharkan kemerdekaan [Filipina]{tempat}.'
      - '[warning] Namun, kemerdekaan tersebut tidak diiktiraf oleh [Amerika Syarikat]{tempat}.'
      - '[globe_meridians] [Filipina]{tempat} kemudian diletakkan di bawah penguasaan Amerika Syarikat.'
    - tajuk: Perjuangan melalui politik
      senarai:
      - '[pushpin] Golongan nasionalis menukar strategi kepada saluran diplomasi dan politik sederhana.'
      - '[tear-off-calendar] Pada [1907]{tahun}, [Sergio Osmena]{tokoh} dilantik sebagai pemimpin [Parti Nasionalis]{pertubuhan}
        dalam Dewan Perhimpunan Filipina.'
      - '[loudspeaker] Perjuangan kemerdekaan diteruskan sehingga [Perang Dunia Kedua]{peristiwa}.'
- tajuk: Nasionalisme di Burma (Myanmar)
  label: Bahagian Kedua
  desc: ''
