  - jenis: board
    tajuk: Info
    strip: true
    senarai: []
  - jenis: accordion
    items:
    - tajuk: Gerakan awal dan isu kasut
      senarai:
      - '[calendar] Pada [1906]{tahun}, [Persatuan Belia Buddha]{pertubuhan} ditubuhkan untuk melindungi agama Buddha serta
        mengekalkan pendidikan dan budaya Burma.'
      - '[mans-shoe] [Isu Kasut]{istilah} digunakan untuk meniup semangat nasionalisme apabila orang British memakai kasut
        dalam kuil Buddha.'
      - '[angry-face] Tindakan ini dianggap mencemarkan kesucian agama dan membangkitkan kemarahan rakyat.'
    - tajuk: Perjuangan radikal dan pemberontakan
      senarai:
      - '[pushpin] Persatuan Belia Buddha kemudian diambil alih oleh [U Ba Pe]{tokoh}.'
      - '[pushpin] Namanya diubah menjadi [Majlis Persatuan Am Kesatuan Burma]{pertubuhan} dan mula memperjuangkan isu bangsa
        Burma.'
      - '[tear-off-calendar] Pada [1920]{tahun}, [Revolusi Pelajar]{peristiwa} berlaku untuk menuntut penubuhan universiti
        tempatan.'
      - '[tear-off-calendar] Pada [1930–1932]{tahun}, [Pemberontakan Saya San]{peristiwa} tercetus.'
      - '[person] Pemberontakan ini diketuai oleh [Saya San]{tokoh}, seorang bekas pongyi, dan disokong oleh petani yang terbeban
        cukai.'
    - tajuk: Gerakan politik
      senarai:
      - '[calendar] Pada [1935]{tahun}, [Perlembagaan Burma]{istilah} diperkenalkan dan Burma dipisahkan dari [India]{tempat}.'
      - '[light_bulb] Keadaan ini meningkatkan tuntutan untuk berkerajaan sendiri.'
      - '[pushpin] Golongan [Thakin]{istilah} menubuhkan [Parti Do Bama Asiayone]{pertubuhan} (Kami Orang Burma).'
      - '[speaking_head] Mereka menggelarkan diri sebagai [Thakin]{istilah} yang bermaksud tuan, untuk menegaskan bahawa orang
        Burma mesti bertuankan orang Burma.'
      - '[tear-off-calendar] Pada [1937]{tahun}, [Dr. Ba Maw]{tokoh} menang pilihan raya dan menjadi Perdana Menteri pertama
        Burma.'
      - '[person] [Aung San]{tokoh}'
      - '[person] [Kyaw Nein]{tokoh}'
      - '[person] [U Nu]{tokoh}'
