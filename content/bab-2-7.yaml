lead: Subtopik ini menjelaskan bagaimana [nasionalisme]{istilah} berkembang dalam kalangan rakyat di negara kita sebelum merdeka
  melalui tiga saluran utama, iaitu perjuangan golongan intelektual, penulisan serta pertubuhan atau persatuan.
ringkasan:
- '[brain] Perkembangan [nasionalisme]{istilah} di negara kita dapat dilihat melalui tiga saluran utama.'
- '[graduation-cap] Golongan intelektual berpendidikan agama, Inggeris dan Melayu menjadi pelopor kesedaran nasionalisme.'
- '[fountain-pen] Penulisan melalui akhbar, majalah dan karya kreatif menyebarkan idea nasionalisme kepada masyarakat.'
- '[handshake_light] Persatuan dan pertubuhan pula menyatukan suara rakyat untuk menuntut hak serta membina jati diri bangsa.'
soalan_utama:
  soalan: Bagaimanakah nasionalisme berkembang dalam kalangan rakyat di negara kita sebelum merdeka?
  heading: Bagaimanakah nasionalisme berkembang dalam kalangan rakyat di negara kita sebelum merdeka?
  jawapan:
  - '[light_bulb] Perkembangan nasionalisme dapat dilihat melalui tiga saluran utama:'
  - '[brain] perjuangan golongan intelektual'
  - '[fountain-pen] perjuangan melalui penulisan'
  - '[handshake_light] perjuangan melalui pertubuhan atau persatuan'
fokus: 'Intelektual Melayu membangkit nasionalisme melalui penulisan dan persatuan. Tiga saluran:'
bahagian:
- tajuk: Perjuangan Golongan Intelektual
  label: Bahagian Pertama
  desc: ''
  kandungan:
  - jenis: board
    tajuk: ''
    strip: false
    senarai: []
  - jenis: board
    tajuk: Info
    strip: true
    senarai:
    - '[calendar] diterbitkan pada [23 Julai 1906]{tahun}'
    - '[books] menyeru kembali kepada ajaran al-Quran dan Hadis'
    - '[loudspeaker] membahaskan polemik Kaum Muda dan Kaum Tua'
    - '[round-pushpin] berkembang di Negeri-negeri Selat'
  - jenis: accordion
    items:
    - tajuk: Intelektual berpendidikan agama
      senarai:
      - '[brain] Golongan ini dikenali sebagai [Kaum Muda]{istilah} dan membawa idea [Gerakan Islah]{gerakan} dari Timur Tengah.'
      - '[man-wearing-turban] [Sheikh Muhammad Tahir Jalaluddin]{tokoh}'
      - '[man-wearing-turban] [Syed Sheikh al-Hadi]{tokoh}'
      - '[man-wearing-turban] [Haji Abbas Mohd Taha]{tokoh}'
    - tajuk: Intelektual berpendidikan Inggeris
      senarai:
      - '[pushpin] Golongan ini dilahirkan melalui [Maktab Melayu Kuala Kangsar (MCKK)]{pertubuhan} yang ditubuhkan pada [1905]{tahun}.'
      - '[pushpin] Pada awalnya, MCKK ditubuhkan untuk melatih anak bangsawan yang berkhidmat dalam pentadbiran.'
      - '[scales] peluang pekerjaan dalam jabatan kerajaan'
      - '[graduation-cap] peluang pendidikan yang lebih luas untuk orang Melayu'
    - tajuk: Intelektual berpendidikan Melayu
      senarai:
      - '[pushpin] Golongan ini lahir melalui [Sultan Idris Training College (SITC)]{pertubuhan} yang ditubuhkan pada [1922]{tahun}.'
      - '[pushpin] SITC menjadi pusat penting dalam membangkitkan kesedaran kebangsaan.'
      - '[fire] Kesannya lahir [Kesatuan Melayu Muda (KMM)]{pertubuhan} yang membawa perjuangan nasionalisme lebih radikal.'
      - '[student] [O.T. Dussek]{tokoh}'
      - '[student] [Abdul Hadi Hassan]{tokoh}'
      - '[student] [Abdul Hadi Abdul Manan]{tokoh}'
      - '[student] [Harun Aminurrashid]{tokoh}'
