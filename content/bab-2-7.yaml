      - '[person] [Dr. Sun Yat Sen]{tokoh} – melawat Negeri-negeri Melayu Bersekutu sebanyak 4 kali'
      - '[person] [Tan Jiak Kim]{tokoh} – menubuhkan Persatuan Orang Cina Peranakan British (SCBA)'
      - '[person] [Tan Cheng Lock]{tokoh} – menghidupkan SCBA di Melaka ([1915]{tahun})'
kesimpulan:
- '[light_bulb] Nasionalisme di negara kita berkembang melalui tiga saluran utama sebelum Perang Dunia Kedua.'
- '[light_bulb] Sumbangan tokoh dan organisasi ini telah mencetuskan semangat nasionalisme sebelum Perang Dunia Kedua dan
  menjadi asas kepada gerakan kemerdekaan yang lebih besar selepasnya.'
- '[keycap_1] golongan intelektual – menggerakkan pendidikan, tafsiran agama dan tulisan'
- '[keycap_2] penulisan – membakar semangat rakyat melalui akhbar, majalah dan karya kreatif'
- '[keycap_3] persatuan – menyatukan suara rakyat untuk menuntut hak dan membina jati diri bangsa'
