    - tajuk: Fajar Sarawak dan perkembangan di Sabah
      senarai:
      - '[pushpin] [Fajar Sarawak]{karya} ditulis oleh:'
      - '[megaphone] Slogan: “Fajar telah tersinsing, bangunlah wahai bangsaku!”'
      - '[pushpin] Di Sabah, penulisan banyak menyentuh isu pendidikan, tanah bumiputera dan kewangan petani.'
      - '[loudspeaker] Isu ini disuarakan oleh Ketua Anak Negeri dan melalui persatuan sosiobudaya.'
      - '[fountain-pen] [Muhammad Rakawi Yusuf]{tokoh}'
      - '[fountain-pen] [Muhammad Awi Anang]{tokoh}'
      - '[fountain-pen] [Muhd Daud Abdul Ghani]{tokoh}'
      - '[fountain-pen] [Haji Abd Rahman Kassim]{tokoh}'
    - tajuk: Akhbar masyarakat Cina dan India
      senarai:
      - '[pushpin] Sebelum abad ke-20:'
      - '[pushpin] Akhbar ini bertujuan merangsang pemikiran masyarakat Huachiao untuk mengekalkan identiti budaya, memperjuangkan
        nasib wanita dan menyemai rasa cinta kepada negara China.'
      - '[pushpin] Selepas abad ke-20:'
      - '[pushpin] Menjelang [1929]{tahun}, akhbar ini lebih bersifat anti-imperialisme.'
      - '[pushpin] Sekitar tahun 1930-an:'
      - '[pushpin] Akhbar ini mula disebarkan di Pulau Pinang dan membahaskan isu perjuangan kelas pekerja serta keadilan
        sosioekonomi.'
      - '[pushpin] Akhbar penting:'
      - '[loudspeaker] Akhbar ini membincangkan isu politik, sosial, perkembangan di India serta kepentingan perpaduan masyarakat
        India kelas menengah di Tanah Melayu.'
      - '[rolled-up-newspaper] [Lat Pau]{karya}'
      - '[rolled-up-newspaper] [Modern Daily News]{karya}'
    - tajuk: 'Karya kreatif: novel, puisi dan cerpen'
      senarai:
      - '[pushpin] Karya kreatif seperti novel, puisi dan cerpen turut menyemai semangat nasionalisme.'
      - '[pushpin] Tema utamanya ialah cinta akan negara dan pembelaan bangsa.'
      - '[pushpin] Novel ini menyeru supaya memerdekakan diri dari segi ekonomi.'
      - '[blue-book] [Mari Kita Berjuang]{karya} – [Abdullah Sidek]{tokoh}'
