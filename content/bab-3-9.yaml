    tajuk: Penyerahan kalah tentera Jepun
    strip: true
    senarai:
    - '[keycap_1] Pendaratan pertama tentera [British]{pertubuhan} di [Pulau Pinang]{tempat} pada [3 September 1945]{tahun},
      iaitu tiga minggu selepas Jepun menyerah kalah.'
    - '[keycap_2] [Leftenan Jeneral Masao Baba]{tokoh} menyerah kalah di [Surrender Point, Labuan]{tempat} pada [10 September
      1945]{tahun}.'
    - '[keycap_3] [Mejar Jeneral Hiyoe Yamamura]{tokoh} menyerah kalah di atas kapal Tentera Laut Australia, [HMAS Kapunda]{istilah},
      di [Kuching, Sarawak]{tempat} pada [11 September 1945]{tahun}.'
    - '[keycap_4] [Lord Mountbatten]{tokoh} menandatangani pernyataan menyerah kalah tentera Jepun di [Singapura]{tempat}
      pada [12 September 1945]{tahun}.'
    - '[keycap_5] [Jeneral Teizo Ishiguro]{tokoh} menyerah kalah kepada [Leftenan O. L. Roberts]{tokoh} di [Kuala Lumpur]{tempat}
      pada [13 September 1945]{tahun}.'
