kesimpulan:
- '[pushpin] Pendudukan Jepun memberikan impak negatif terhadap keharmonian masyarakat di negara kita.'
- '[pushpin] Keretakan hubungan kaum menyebabkan pelbagai usaha dilakukan bagi mengembalikan keharmonian masyarakat.'
- '[pushpin] Peristiwa ini memberikan iktibar kepada kita supaya mengelak daripada perkara yang boleh menimbulkan ketegangan
  antara kaum.'
- '[light_bulb] Tindakan sedemikian boleh menjadi ancaman kepada kerukunan hidup bermasyarakat dan kestabilan negara.'
