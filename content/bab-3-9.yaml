- tajuk: Penguasaan Bintang Tiga di Tanah Melayu
  label: Bahagian Kedua
  desc: ''
  kandungan:
  - jenis: board
    tajuk: ''
    strip: false
    senarai: []
  - jenis: board
    tajuk: Tindakan Bintang Tiga
    strip: true
    senarai:
    - '[round-pushpin] [Parti Komunis Malaya]{pertubuhan} melalui [Bintang Tiga]{pertubuhan} telah menguasai [bandar]{tempat},
      [balai polis]{tempat} dan [pejabat pentadbiran kerajaan]{tempat} yang ditinggalkan oleh tentera Jepun.'
    - '[scales] [Bintang Tiga]{pertubuhan} menjalankan [undang-undang sendiri]{istilah} dan menggunakan [mahkamah komunis]{istilah}
      untuk menjatuhkan hukuman mati terhadap sesiapa yang bekerjasama dengan Jepun, terutama [orang Melayu]{istilah}.'
    - '[skull] Tindakan [Bintang Tiga]{pertubuhan} menyeksa dan membunuh [anggota polis]{istilah}, [askar]{istilah}, [pegawai
      daerah]{istilah} dan [pasukan sukarelawan Melayu]{istilah} dianggap perbuatan melampau dan mencabar kesabaran orang
      Melayu.'
    - '[calendar] Selama lebih kurang [14 hari]{tahun}, [Tanah Melayu]{tempat} berada di bawah penguasaan [Bintang Tiga]{pertubuhan}.'
  - jenis: board
    tajuk: Pemimpin kebangkitan orang Melayu
    strip: true
    senarai:
    - '[pushpin] Di Johor, [Haji Salleh Abdul Karim]{tokoh} atau dikenali sebagai [Kiai Salleh]{tokoh} mempelopori penentangan
      terhadap Bintang Tiga dengan menubuhkan pasukan [Tentera Selempang Merah]{pertubuhan}.'
    - '[pushpin] Di Sungai Manik, Perak, [Tuan Haji Bakri Haji Mohd Saman]{tokoh} menjadi [Khalifah Parang Panjang]{istilah}
      dalam usaha mempertahankan orang Melayu daripada ancaman Bintang Tiga.'
    - '[pushpin] Keadaan ini menyebabkan negara kita berada dalam suasana tidak aman.'
  - jenis: board
    tajuk: Info
    strip: true
    senarai:
    - '[pushpin] [Teluk Intan]{tempat} dahulunya dikenali sebagai [Teluk Anson]{tempat}.'
    - '[pushpin] Nama asalnya ialah [Teluk Mak Intan]{tempat}.'
    - '[pushpin] Pada [1882]{tahun}, namanya ditukar kepada Teluk Anson bersempena dengan nama [Archibald Anson]{tokoh}, Pegawai
      Daerah Hilir Perak.'
    - '[pushpin] Pada [1 Januari 1982]{tahun}, namanya ditukar kepada Teluk Intan.'
  - jenis: board
    tajuk: Usaha Dato' Onn Jaafar
    strip: true
    senarai:
    - '[pushpin] [Dato'' Onn Jaafar]{tokoh} dilantik oleh [Sultan Ibrahim]{tokoh} sebagai Pegawai Daerah Batu Pahat dengan
      tugas utamanya menamatkan kekacauan dan memulihkan keamanan di Batu Pahat.'
    - '[calendar] Pada [Ogos 1945]{tahun}, Dato'' Onn Jaafar mengatur perundingan antara Kiai Salleh dan pemimpin Melayu dengan
      ketua Bintang Tiga di [Dewan Perniagaan Cina Batu Pahat]{tempat}.'
    - '[pushpin] Kompromi beliau berjaya memujuk Kiai Salleh membebaskan orang Cina yang ditahan di [Parit Raja]{tempat},
      manakala Bintang Tiga pula menamatkan penguasaan mereka di [Balai Polis Batu Pahat]{tempat}.'
    - '[pushpin] Kedua-dua pihak memberikan kerjasama kepada beliau sebagai Pegawai Daerah untuk mengembalikan keamanan di
      Johor.'
  - jenis: board
    tajuk: Peranan Raja-raja Melayu
    strip: true
    senarai:
    - '[pushpin] Raja-raja Melayu berperanan penting dalam usaha menyelesaikan pergaduhan kaum.'
    - '[pushpin] Contohnya, [Sultan Pahang, Sultan Abu Bakar Ri''ayatuddin Al-Mu''adzam Shah]{tokoh} berangkat ke [Kuala Lipis]{tempat}
      untuk mengingatkan penduduk agar tidak lagi berlaku pergaduhan antara orang Melayu dengan orang Cina.'
    - '[pushpin] [Sultan Perak, Sultan Abdul Aziz Almustasim Billah Shah]{tokoh} juga mengadakan lawatan dan pemantauan ke
      beberapa daerah bagi memastikan tiada berlaku pergaduhan antara orang Melayu dengan orang Cina.'
    - '[pushpin] Baginda melawat kawasan yang terlibat untuk berjumpa dengan pemimpin setempat.'
    - '[pushpin] Mesyuarat dengan penghulu, ketua kampung dan pegawai kerajaan diadakan bagi memastikan kerja pemulihan selepas
      perang diberikan keutamaan.'
  - jenis: accordion
