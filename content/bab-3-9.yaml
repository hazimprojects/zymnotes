description: 'Nota Sejarah Tingkatan 4 Bab 3.9 (Konflik Dunia dan Pendudukan Jepun di Negara Kita): Keadaan Negara Kita Selepas
  Kekalahan Jepun. Ringkasan padat untuk ulang kaji SPM.'
lead: Subtopik ini menerangkan keadaan negara kita selepas [kekalahan Jepun]{peristiwa}, termasuk pengakhiran [Perang Dunia
  Kedua]{peristiwa}, [kekosongan kuasa]{istilah}, penguasaan [Bintang Tiga]{pertubuhan}, tindak balas orang Melayu, usaha
  perundingan, serta keadaan di [Sarawak]{tempat} selepas Jepun menyerah kalah.
ringkasan:
- '[collision] Amerika Syarikat menggunakan bom atom terhadap [Hiroshima]{tempat} dan [Nagasaki]{tempat} pada [Ogos 1945]{tahun},
  lalu membawa kepada kekalahan tentera Jepun dan berakhirnya [Perang Dunia Kedua]{peristiwa}.'
- '[crossed_swords] Kelewatan pendaratan semula tentera British mewujudkan [kekosongan kuasa politik]{istilah} yang membolehkan
  [Bintang Tiga]{pertubuhan} menguasai Tanah Melayu buat sementara waktu.'
- '[shield] Orang Melayu bangkit mempertahankan institusi politik, kekeluargaan dan agama Islam, manakala pemimpin masyarakat
  serta Raja-raja Melayu berusaha memulihkan keamanan melalui kompromi dan perundingan.'
- '[deciduous-tree] Di Sarawak, ketegangan antara kaum berlaku di beberapa tempat sebelum campur tangan tentera Australia
  berjaya menghalang pertumpahan darah yang lebih besar.'
soalan_utama:
  soalan: Apakah keadaan negara kita selepas kekalahan Jepun?
  heading: Apakah keadaan negara kita selepas kekalahan Jepun?
  jawapan:
  - '[light_bulb] Kekalahan tentera Jepun membawa berakhirnya Perang Dunia Kedua, tetapi pada masa yang sama mewujudkan keadaan
    tidak stabil di negara kita.'
  - '[pushpin] Kekosongan kuasa politik telah membuka ruang kepada penguasaan Bintang Tiga di Tanah Melayu, seterusnya mencetuskan
    tindak balas orang Melayu, usaha perundingan dan pelbagai tindakan bagi memulihkan keamanan.'
fokus: 'Ogos 1945: Jepun kalah, timbul kekosongan kuasa dan huru-hara. Empat perkara:'
