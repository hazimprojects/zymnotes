lead: Subtopik ini menerangkan bagaimana [Parti Komunis Malaya (PKM)]{pertubuhan} melancarkan perjuangan bersenjata selepas
  [Perang Dunia Kedua]{peristiwa}, menyebabkan [British]{pertubuhan} mengisytiharkan [darurat]{istilah} dan memulakan usaha
  membanteras ancaman komunis di negara kita.
ringkasan:
- '[police-car-light] Selepas [Perang Dunia Kedua]{peristiwa}, [PKM]{pertubuhan} melancarkan perjuangan bersenjata untuk menubuhkan
  [Republik Komunis]{gerakan} di [Tanah Melayu]{tempat}.'
- '[calendar] Pembunuhan tiga pengurus ladang Eropah di [Sungai Siput, Perak]{tempat} pada [16 Jun 1948]{masa} membawa kepada
  pengisytiharan [darurat]{istilah}.'
- '[bomb] Selepas darurat, komunis terus melancarkan tindakan yang melumpuhkan [ekonomi]{istilah}, merosakkan [infrastruktur]{istilah},
  mengancam [keselamatan rakyat]{istilah} dan menyerang [pasukan keselamatan]{istilah}.'
- '[handshake_light] Ancaman ini menyebabkan rakyat hidup dalam ketakutan dan mendorong kerajaan serta penduduk bekerjasama
  untuk membanteras komunis demi menjaga keamanan negara.'
soalan_utama:
  soalan: Bagaimanakah komunis mengancam keamanan negara selepas Perang Dunia Kedua?
  heading: Bagaimanakah komunis mengancam keamanan negara selepas Perang Dunia Kedua?
  jawapan:
