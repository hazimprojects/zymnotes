    bersenjata untuk menubuhkan [Republik Komunis]{gerakan} di [Tanah Melayu]{tempat}.'
  - '[pushpin] Tindakan ini menyebabkan [British]{pertubuhan} mengisytiharkan [darurat]{istilah} dan memulakan usaha membanteras
    ancaman komunis.'
