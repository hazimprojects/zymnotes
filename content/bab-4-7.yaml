lead: Subtopik ini menerangkan mengapa penyerahan [Sabah]{tempat} kepada British tidak mendapat tentangan besar daripada penduduk
  tempatan, termasuk pengaruh [dasar British]{pentadbiran} dan pertimbangan [sosioekonomi]{istilah} masyarakat ketika itu.
ringkasan:
- '[globe_meridians] Penyerahan [Sabah]{tempat} kepada British pada [15 Julai 1946]{masa} tidak mendapat penentangan besar
  daripada penduduk tempatan.'
- '[warning] Hal ini berlaku kerana British berjaya melemahkan [gerakan berpersatuan]{pertubuhan} dan mengehadkan peluang
  penduduk tempatan dalam pentadbiran.'
- '[briefcase] Pada masa yang sama, ramai penduduk melihat penyerahan itu sebagai peluang untuk memajukan kehidupan dan membangunkan
  semula Sabah selepas perang.'
- '[hibiscus] Walaupun kebangkitan nasionalisme di Sabah berkembang lebih perlahan, pengalaman di bawah British tetap menanam
  kesedaran politik dalam kalangan penduduk tempatan.'
