lead: Subtopik ini menerangkan pelbagai langkah yang diambil oleh kerajaan untuk menangani ancaman [komunis]{gerakan} melalui
  pendekatan [undang-undang]{istilah}, [keselamatan]{istilah}, [pentadbiran]{istilah}, [psikologi]{istilah} dan [rundingan]{istilah}.
ringkasan:
- '[police-car-light] Kerajaan melaksanakan pelbagai langkah untuk menangani ancaman [komunis]{gerakan} dari segi [undang-undang]{istilah},
  [keselamatan]{istilah}, [pentadbiran]{istilah}, [psikologi]{istilah} dan [rundingan]{istilah}.'
- '[police-officer] Usaha ini merangkumi penguatkuasaan [Undang-Undang Darurat]{istilah}, pemerkasaan pasukan keselamatan,
  sistem pendaftaran kebangsaan, [Rancangan Briggs]{istilah} dan tawaran pengampunan.'
- '[megaphone] Kerajaan juga melaksanakan [Kempen Bulan Rakyat Melawan Penjahat]{istilah}, [perintah berkurung]{istilah} dan
  [perang saraf]{istilah} untuk melemahkan pengaruh komunis.'
- '[handshake_light] Selain tindakan keselamatan, kerajaan turut berusaha menamatkan konflik melalui [Rundingan Baling]{peristiwa},
  walaupun rundingan itu gagal.'
soalan_utama:
  soalan: Apakah usaha yang dilakukan oleh kerajaan untuk menangani ancaman komunis di negara kita?
  heading: Apakah usaha yang dilakukan oleh kerajaan untuk menangani ancaman komunis di negara kita?
  jawapan:
  - '[light_bulb] Bagi menangani ancaman komunis, kerajaan telah melaksanakan pelbagai langkah dari segi undang-undang, keselamatan,
    pentadbiran, psikologi dan rundingan.'
  - '[pushpin] Usaha ini dilakukan untuk melemahkan gerakan komunis, melindungi rakyat dan memulihkan keamanan negara.'
