    - '[pushpin] Ada parti yang berasaskan kaum, ada juga yang bersifat pelbagai kaum. Walaupun matlamat mereka berbeza dari
      segi pendekatan, kebanyakannya menuju kepada satu matlamat utama, iaitu membebaskan tanah air daripada penjajah dan
