kesimpulan:
- '[light_bulb] Penubuhan parti politik membantu menyusun perjuangan rakyat dengan lebih teratur dan matang, seterusnya membuka
  jalan kepada kerjasama politik yang lebih luas.'
- '[hibiscus] Kematangan politik, permuafakatan dan kesediaan berkongsi kepentingan inilah yang menjadi landasan penting kepada
  kemerdekaan negara kita.'
- '[pushpin] penubuhan parti politik selepas Perang Dunia Kedua menunjukkan rakyat semakin sedar akan pentingnya organisasi
  politik dalam perjuangan kemerdekaan'
- '[handshake_light] walaupun banyak parti ditubuhkan atas dasar kaum, perkembangan ini akhirnya mendorong pemimpin untuk
  bekerjasama dan bertolak ansur'
- '[hibiscus] kerjasama politik antara kaum menjadi asas penting ke arah kemerdekaan dan kehidupan yang rukun serta damai'
