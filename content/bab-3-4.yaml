lead: Subtopik ini menerangkan bagaimana [Perang Dunia Kedua di Asia Pasifik]{peristiwa} bermula, faktor kebangkitan Jepun
  sebagai kuasa tentera, dasar peluasan kuasanya, sekatan ekonomi oleh Kuasa Bersekutu serta serangan-serangan awal Jepun
  di rantau Asia Pasifik.
ringkasan:
- '[water-wave] [Perang Dunia Kedua di Asia Pasifik]{peristiwa} berlaku antara [1941]{tahun} hingga [1945]{tahun} dan juga
  dikenali sebagai [Perang Pasifik]{peristiwa}.'
- '[globe] Pertempuran berlaku di [Lautan Pasifik]{tempat}, [Tanah Besar Asia]{tempat} dan [Kepulauan Asia Tenggara]{tempat}.'
- '[chart] Peperangan ini berpunca daripada kebangkitan Jepun sebagai kuasa tentera yang menjalankan dasar imperialisme di
  rantau Asia Pasifik.'
- '[prohibited] Sekatan ekonomi oleh Amerika Syarikat, British dan Belanda mempercepatkan tindakan Jepun meluaskan serangan
  ke selatan.'
- '[bomb] Perang bermula apabila Jepun menyerang [Tanah Melayu]{tempat} dan [Pearl Harbor]{tempat} pada [8 Disember 1941]{tahun}.'
