lead: Subtopik ini menerangkan maksud [Malayan Union]{pentadbiran}, sebab British memperkenalkannya di [Tanah Melayu]{tempat},
  ciri-ciri utama perlembagaannya, serta cara British mendapatkan persetujuan [Raja-raja Melayu]{tokoh}.
ringkasan:
- '[classical_building] [Malayan Union]{pentadbiran} diperkenalkan oleh British di [Tanah Melayu]{tempat} untuk menggantikan
  [British Military Administration (BMA)]{pentadbiran}.'
- '[page-facing-up] Gagasan ini boleh difahami melalui dua bahagian utama, iaitu [latar belakang dan ciri-ciri Malayan Union]{istilah}
  serta [cara British mendapatkan tandatangan Sultan]{istilah}.'
- '[crown] [Malayan Union]{pentadbiran} mengurangkan kuasa [Raja-raja Melayu]{tokoh} dan meletakkan [Tanah Melayu]{tempat}
  di bawah kawalan British yang lebih langsung.'
- '[writing-hand] British memperoleh persetujuan [Raja-raja Melayu]{tokoh} melalui [H.C. Willan]{tokoh} dan [Sir Harold MacMichael]{tokoh}
  dengan desakan, tekanan dan paksaan politik.'
soalan_utama:
  soalan: Apakah Malayan Union, mengapakah British memperkenalkannya, dan bagaimanakah British mendapatkan persetujuan Raja-raja
    Melayu?
  heading: Apakah Malayan Union, mengapakah British memperkenalkannya, dan bagaimanakah British mendapatkan persetujuan Raja-raja
    Melayu?
  jawapan:
  - '[light_bulb] [Malayan Union]{pentadbiran} diperkenalkan oleh British di [Tanah Melayu]{tempat} untuk menggantikan [British
    Military Administration (BMA)]{pentadbiran}. British berharap sistem ini dapat melicinkan pentadbiran, meningkatkan pelaburan
    ekonomi, mengukuhkan pertahanan dan mengekalkan orang asing sebagai tenaga kerja.'
  - '[warning] Namun, gagasan ini sebenarnya mengurangkan kuasa [Raja-raja Melayu]{tokoh} dan mengubah kedudukan [Tanah Melayu]{tempat}
    di bawah British.'
