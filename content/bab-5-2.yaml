lead: Subtopik ini menerangkan faktor yang mendorong penubuhan [Persekutuan Tanah Melayu 1948]{pentadbiran}, termasuk [penentangan
  orang Melayu terhadap Malayan Union]{istilah}, cadangan [Raja-raja Melayu]{tokoh} dan [UMNO]{pertubuhan}, serta sokongan
  pentadbir [British]{pertubuhan}.
ringkasan:
- '[calendar] [Persekutuan Tanah Melayu 1948]{pentadbiran} ditubuhkan secara rasmi pada [1 Februari 1948]{masa} selepas [Raja-raja
  Melayu]{tokoh} menandatangani [Perjanjian Persekutuan Tanah Melayu 1948]{perjanjian}.'
- '[raised_fist] Penubuhannya didorong oleh [penentangan orang Melayu terhadap Malayan Union]{istilah} yang dianggap menjejaskan
  kedudukan [Raja-raja Melayu]{tokoh} dan orang Melayu.'
- '[crown] Cadangan [Raja-raja Melayu]{tokoh} dan [UMNO]{pertubuhan} memberi asas kepada pembentukan sistem pentadbiran baharu
  yang lebih sesuai.'
- '[globe_meridians] Sokongan pentadbir [British]{pertubuhan} pula membantu mengukuhkan usaha ke arah pembentukan persekutuan
  yang lebih stabil dari sudut politik dan ekonomi.'
soalan_utama:
  soalan: Apakah faktor yang mendorong penubuhan Persekutuan Tanah Melayu 1948?
  heading: Apakah faktor yang mendorong penubuhan Persekutuan Tanah Melayu 1948?
  jawapan:
  - '[light_bulb] [Persekutuan Tanah Melayu 1948]{pentadbiran} ditubuhkan secara rasmi pada [1 Februari 1948]{masa} selepas
    [Raja-raja Melayu]{tokoh} menandatangani [Perjanjian Persekutuan Tanah Melayu 1948]{perjanjian}.'
  - '[pushpin] Penubuhannya didorong oleh beberapa faktor utama, iaitu [penentangan orang Melayu terhadap Malayan Union]{istilah},
    [cadangan Raja-raja Melayu dan UMNO]{istilah}, serta [sokongan pentadbir British]{istilah}.'
