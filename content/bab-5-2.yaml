kesimpulan:
- '[pushpin] Penubuhan [Persekutuan Tanah Melayu 1948]{pentadbiran} didorong oleh tiga faktor utama, iaitu:'
- '[pushpin] Bantahan orang Melayu telah membuka mata British bahawa [Malayan Union]{pentadbiran} ditolak oleh penduduk tempatan
  dari pelbagai lapisan.'
- '[pushpin] Pada masa yang sama, cadangan [Raja-raja Melayu]{tokoh} dan [UMNO]{pertubuhan} memberi asas kepada pembentukan
  satu sistem pentadbiran baharu yang lebih sesuai.'
- '[light_bulb] Sokongan pentadbir British pula mengukuhkan lagi usaha menubuhkan [Persekutuan Tanah Melayu]{pentadbiran}
  demi mewujudkan kestabilan politik, kemajuan ekonomi dan perubahan pentadbiran selepas perang.'
