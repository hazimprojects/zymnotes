lead: Subtopik ini menerangkan mengapa [Sarawak]{tempat} diserahkan kepada British selepas [Perang Dunia Kedua]{masa}, faktor-faktor
  yang mempengaruhi keputusan [Vyner Brooke]{tokoh}, serta proses penyerahan yang akhirnya menukar Sarawak menjadi [Tanah
  Jajahan British]{istilah}.
ringkasan:
- '[globe_meridians] Selepas [Perang Dunia Kedua]{masa}, [Sarawak]{tempat} diserahkan kepada kerajaan British.'
- '[crown] Penyerahan ini berlaku kerana gabungan faktor [masalah pewarisan takhta]{istilah}, desakan British dan masalah
  kewangan yang dihadapi oleh [Vyner Brooke]{tokoh}.'
- '[scroll_old] Proses penyerahan melibatkan surat daripada [Pejabat Tanah Jajahan]{pentadbiran}, usaha [Gerard T. MacBryan]{tokoh}
  mendapatkan persetujuan ketua tempatan, dan undian [Cession Bill]{istilah} di [Majlis Negeri]{istilah}.'
- '[warning] Walau bagaimanapun, penyerahan ini mendapat tentangan hebat terutama daripada masyarakat peribumi di [Sarawak]{tempat}.'
soalan_utama:
