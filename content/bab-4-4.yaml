  jawapan:
  - '[light_bulb] Selepas [Perang Dunia Kedua]{masa}, [Sarawak]{tempat} diserahkan kepada kerajaan British. Penyerahan ini
    berlaku kerana masalah pewarisan takhta, desakan British dan masalah kewangan yang dihadapi oleh [Vyner Brooke]{tokoh}.'
  - '[warning] Namun, penyerahan ini telah menimbulkan pelbagai reaksi dalam kalangan penduduk tempatan di Sarawak.'
