kesimpulan:
- '[light_bulb] Penyerahan Sabah menunjukkan British mahu terus menguasai negeri itu selepas perang.'
- '[pushpin] Penyerahan Sabah kepada British berlaku kerana:'
- '[pushpin] Penyerahan ini menyebabkan Sabah berubah daripada wilayah di bawah [Syarikat Borneo Utara British]{pentadbiran}
  kepada [tanah jajahan British]{istilah}.'
- '[light_bulb] Peristiwa ini membuktikan bahawa British bukan sahaja mahu memulihkan Sabah selepas perang, tetapi juga ingin
  terus menguasai negeri itu demi kepentingan politik dan ekonominya.'
- '[hibiscus] Oleh itu, penyerahan Sabah kepada British menjadi satu peristiwa penting dalam sejarah negeri tersebut kerana
  membuka jalan kepada perubahan pentadbiran dan perkembangan politik selepas perang.'
