lead: Subtopik ini menerangkan peranan [British Military Administration (BMA)]{pentadbiran} di [Tanah Melayu]{tempat} selepas
  [Jepun menyerah kalah]{masa}, serta menilai sejauh mana pentadbiran ini berjaya memulihkan keamanan, kehidupan rakyat dan
  keyakinan terhadap British.
ringkasan:
- '[military-helmet] [British Military Administration (BMA)]{pentadbiran} ialah pentadbiran tentera British di [Tanah Melayu]{tempat}
  yang bermula pada [12 September 1945]{masa}.'
- '[person] BMA berada di bawah arahan [Lord Mountbatten]{tokoh}, manakala hal ehwal awam dirancang oleh [Brigedier Jeneral
  H.C. Willan]{tokoh}.'
- '[shield] Tujuan utama BMA ialah mengembalikan [kestabilan dan keamanan]{istilah} serta memulihkan [kepercayaan rakyat]{istilah}
  terhadap British.'
- '[warning] Walau bagaimanapun, BMA gagal mengawal masalah keselamatan, inflasi, pasar gelap, bekalan makanan dan pemulihan
  ekonomi dengan berkesan.'
soalan_utama:
  soalan: Apakah peranan British Military Administration (BMA) di Tanah Melayu selepas Jepun menyerah kalah, dan sejauh manakah
    pentadbiran ini berjaya?
  heading: Apakah peranan British Military Administration (BMA) di Tanah Melayu selepas Jepun menyerah kalah, dan sejauh manakah
    pentadbiran ini berjaya?
  jawapan:
  - '[light_bulb] [British Military Administration (BMA)]{pentadbiran} ialah pentadbiran tentera British di [Tanah Melayu]{tempat}
    yang bertujuan memulihkan keamanan, kestabilan dan kepercayaan rakyat selepas perang. Namun, pentadbiran ini tidak berjaya
    sepenuhnya kerana banyak masalah harian rakyat masih gagal diatasi.'
fokus: 'BMA (1945): pentadbiran tentera British selepas Jepun kalah. Empat perkara:'
