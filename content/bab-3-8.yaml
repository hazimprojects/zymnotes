kesimpulan:
- '[pushpin] Pendudukan Jepun telah mempercepat perkembangan nasionalisme tempatan di negara kita.'
- '[pushpin] Antara kesan utamanya ialah:'
- '[pushpin] Pengalaman melihat British ditewaskan, peluang politik semasa pendudukan Jepun dan kesedaran baharu dalam kalangan
  rakyat telah menguatkan keinginan untuk bebas daripada penjajahan.'
- '[light_bulb] Pendudukan Jepun membuktikan bahawa walaupun rakyat hidup dalam kesengsaraan, pengalaman tersebut akhirnya
  membangkitkan keberanian dan keyakinan untuk memperjuangkan kemerdekaan di Tanah Melayu, Sarawak dan Sabah.'
- '[fire] semangat antipenjajah semakin meningkat'
- '[flexed-biceps] rakyat menjadi lebih yakin terhadap kebolehan sendiri'
- '[triangular-flag] perjuangan kemerdekaan diteruskan dengan lebih tersusun selepas Jepun menyerah kalah'
