description: 'Nota Sejarah Tingkatan 4 Bab 3.8 (Konflik Dunia dan Pendudukan Jepun di Negara Kita): Perkembangan Gerakan Nasionalisme
  Tempatan dan Pendudukan Jepun. Ringkasan padat untuk ulang kaji SPM.'
lead: Subtopik ini menerangkan bagaimana pendudukan Jepun meninggalkan kesan besar terhadap kehidupan masyarakat di negara
  kita serta membawa perkembangan nasionalisme tempatan di [Tanah Melayu]{tempat}, [Sarawak]{tempat} dan [Sabah]{tempat}.
ringkasan:
- '[fire] Pendudukan Jepun membawa perkembangan nasionalisme tempatan melalui semangat antipenjajah, keyakinan bahawa kuasa
  Eropah boleh ditewaskan, dan peluang politik yang muncul semasa pendudukan.'
- '[hibiscus] Di Tanah Melayu, perjuangan kemerdekaan orang Melayu berkembang melalui [KMM]{pertubuhan}, penglibatan dalam
  [Giyu Gun]{pertubuhan} dan [Giyu Tai]{pertubuhan}, serta penubuhan [KRIS]{pertubuhan} sebelum perjuangan diteruskan oleh
  [PKMM]{pertubuhan}.'
- '[deciduous-tree] Di Sarawak dan Sabah, peluang memegang jawatan lebih tinggi dan penubuhan pertubuhan baharu menimbulkan
  keyakinan politik untuk mentadbir sendiri selepas perang.'
soalan_utama:
  soalan: Bagaimanakah pendudukan Jepun membawa perkembangan nasionalisme tempatan di Tanah Melayu, Sarawak dan Sabah?
  heading: Bagaimanakah pendudukan Jepun membawa perkembangan nasionalisme tempatan di Tanah Melayu, Sarawak dan Sabah?
  jawapan:
  - '[light_bulb] Pendudukan Jepun mengubah landskap politik dan mempercepat kesedaran nasionalisme dalam kalangan penduduk
    tempatan.'
