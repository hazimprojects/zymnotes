      senarai:
      - '[calendar] Pada [Jun 1942]{tahun}, tentera Jepun membubarkan [KMM]{pertubuhan}.'
      - '[pushpin] Hal ini berlaku kerana tindakan pemimpinnya menuntut kemerdekaan daripada Jepun.'
      - '[pushpin] Pemimpin KMM sedar bahawa Jepun tidak akan memberikan kemerdekaan kepada Tanah Melayu, walaupun KMM telah
