    [kepentingan strategik ketenteraan]{istilah}.'
  - '[pushpin] Jepun mahu mengeksploitasi kekayaan bahan mentah negara kita untuk keperluan perindustrian dan peperangan.'
  - '[pushpin] Pada masa yang sama, kedudukan negara kita sangat penting untuk pergerakan tentera Jepun dalam menawan kawasan
    lain di Asia Tenggara.'
fokus: 'Jepun menyerang Tanah Melayu (Disember 1941) demi ekonomi dan strategi. Tiga aspek:'
