  - jenis: accordion
    items:
    - tajuk: A. Kemaraan di Tanah Melayu dan Singapura
      senarai:
      - '[pushpin] Serangan tentera Jepun di Tanah Melayu berlaku melalui [tiga laluan kemaraan utama]{istilah}.'
      - '[pushpin] Kemaraan dari Thailand sebenarnya berpecah kepada dua laluan utama, menjadikan jumlah keseluruhan laluan
        serangan Jepun di Tanah Melayu sebanyak tiga.'
      - '[light_bulb] Ini menunjukkan bahawa kemaraan tentera Jepun sangat terancang dan dilakukan dari beberapa arah secara
        serentak.'
      - '[pushpin] Kapal perang British [Repulse]{tempat} dan [Prince of Wales]{tempat} digerakkan untuk menyekat kemaraan
        Jepun tetapi ditenggelamkan oleh tentera Jepun di perairan [Kuantan]{tempat}.'
