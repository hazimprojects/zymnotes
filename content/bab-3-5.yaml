      - '[keycap_2] Laluan Pantai Barat – tentera Jepun mendarat di Singgora dan Patani (Thailand), memasuki Kedah dan bergerak
        melalui pantai barat'
      - '[keycap_3] Laluan Darat Tengah – pasukan dari Thailand bergerak melalui jalan darat menuju bandar utama di Tanah
        Melayu'
