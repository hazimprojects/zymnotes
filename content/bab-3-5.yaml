lead: Subtopik ini menghuraikan sebab Jepun datang ke negara kita, iaitu untuk [mengeksploitasi sumber bahan mentah]{istilah}
  dan memanfaatkan [kepentingan strategik ketenteraan]{istilah} negara kita dalam usaha peluasan kuasa Jepun di Asia Tenggara.
ringkasan:
- '[sushi] Jepun datang ke negara kita kerana dua faktor utama, iaitu [eksploitasi sumber bahan mentah]{istilah} dan [kepentingan
  strategik ketenteraan]{istilah}.'
- '[calendar] Pada [8 Disember 1941]{tahun}, tentera Jepun mula menyerang [Tanah Melayu]{tempat}, manakala pada [16 Disember
  1941]{tahun} Jepun melancarkan serangan ke atas [Sarawak]{tempat} dan [Sabah]{tempat}.'
- '[pick] Negara kita menjadi sasaran kerana kaya dengan bahan mentah seperti bijih timah, getah, emas, bijih besi, arang
  batu, bauksit dan petroleum.'
- '[anchor] Kedudukan strategik negara kita pula penting untuk ketenteraan Jepun, khususnya bagi menguasai pangkalan di Singapura,
  telaga minyak di Sumatera dan laluan ke Pulau Jawa.'
soalan_utama:
  soalan: Mengapakah Jepun datang menyerang dan menduduki negara kita pada tahun 1941–1942?
  heading: Mengapakah Jepun datang menyerang dan menduduki negara kita pada tahun 1941–1942?
  jawapan:
