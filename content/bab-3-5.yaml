kesimpulan:
- '[pushpin] Jepun datang ke negara kita kerana:'
- '[pushpin] Serangan Jepun dilakukan secara pantas dan terancang melalui beberapa arah di [Tanah Melayu]{tempat}, [Sarawak]{tempat}
  dan [Sabah]{tempat}.'
- '[pushpin] Akhirnya, seluruh negara kita jatuh ke tangan Jepun dan menjadi sebahagian daripada empayar tenteranya di Asia.'
- '[light_bulb] Peristiwa ini membuktikan bahawa kekayaan sumber alam dan kedudukan strategik negara kita telah menjadikan
  tanah air kita sasaran kuasa asing.'
