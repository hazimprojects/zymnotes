lead: Subtopik ini menerangkan bagaimana penduduk tempatan bertindak balas terhadap penyerahan [Sarawak]{tempat} kepada British,
  termasuk golongan yang menentang dan golongan yang menyokong penyerahan tersebut.
ringkasan:
- '[raised_fist] Penyerahan [Sarawak]{tempat} kepada British mencetuskan dua reaksi yang berbeza, iaitu golongan yang menentang
  dan golongan yang menyokong penyerahan.'
- '[warning] Golongan yang menentang melihat penyerahan itu sebagai satu bentuk penjajahan baharu dan pelanggaran terhadap
  [Perlembagaan 1941]{istilah}.'
- '[newspaper] Gerakan antipenyerahan menggunakan persidangan, demonstrasi, peletakan jawatan, akhbar, surat bantahan dan
  penubuhan [Rukun 13]{pertubuhan}.'
- '[handshake_light] Golongan yang menyokong pula percaya British dapat memajukan negeri, meningkatkan taraf hidup rakyat
  dan membuka peluang pekerjaan.'
soalan_utama:
  soalan: Bagaimanakah penduduk tempatan bertindak balas terhadap penyerahan Sarawak kepada British?
  heading: Bagaimanakah penduduk tempatan bertindak balas terhadap penyerahan Sarawak kepada British?
  jawapan:
  - '[light_bulb] Penyerahan [Sarawak]{tempat} kepada British mencetuskan dua reaksi utama, iaitu penentangan dan sokongan
    daripada penduduk tempatan.'
  - '[light_bulb] Golongan yang menentang melihat penyerahan itu sebagai penjajahan baharu, manakala golongan yang menyokong
    percaya British dapat membawa kemajuan kepada Sarawak.'
