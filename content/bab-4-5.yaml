- tajuk: Faktor Sokongan terhadap Penyerahan Sarawak
  label: Bahagian Kelima
  desc: ''
  kandungan:
  - jenis: accordion
    items:
    - tajuk: Memajukan Negeri
      senarai:
      - '[pushpin] Golongan propenyerahan berpendapat bahawa selepas perang, Sarawak mengalami kemusnahan besar.'
      - '[pushpin] Mereka percaya penyerahan kepada British dapat memajukan Sarawak dari segi:'
      - '[classical_building] Politik'
      - '[motorway] Perhubungan'
      - '[chart-increasing-with-yen] Perdagangan'
      - '[rice] Pertanian'
      - '[school] Pendidikan'
      - '[hospital] Kesihatan'
      - '[smiling-face-with-smiling-eyes] Taraf hidup rakyat'
    - tajuk: Memajukan Penduduk Tempatan
      senarai:
      - '[pushpin] Golongan propenyerahan menubuhkan [Young Malay Association (YMA)]{pertubuhan}.'
      - '[chart] Menggalakkan kemajuan orang Melayu dalam bidang ekonomi dan sosial'
      - '[handshake_light] Membantu orang Melayu yang ketinggalan'
    - tajuk: Memberikan Peluang Pekerjaan dalam Perkhidmatan Awam
      senarai:
      - '[pushpin] Penyokong penyerahan percaya British akan membuka lebih banyak peluang pekerjaan kepada golongan intelektual
        tempatan dalam perkhidmatan kerajaan.'
      - '[light_bulb] Mereka juga percaya British akan memberi taraf berkerajaan sendiri kepada Sarawak pada masa hadapan.'
      - '[scales] Peguam'
      - '[stethoscope] Doktor'
      - '[building-construction] Jurutera'
kesimpulan:
- '[light_bulb] Penyerahan Sarawak mencetuskan perpecahan pandangan tetapi menyemarakkan nasionalisme.'
- '[pushpin] Penyerahan Sarawak kepada British telah mencetuskan dua reaksi yang berbeza dalam kalangan penduduk tempatan.'
- '[pushpin] Golongan yang menentang melihat penyerahan itu sebagai:'
- '[pushpin] Golongan yang menyokong pula percaya British dapat:'
- '[light_bulb] Walaupun gerakan antipenyerahan akhirnya gagal, perjuangan tersebut berjaya membangkitkan kesedaran politik
  dan semangat nasionalisme dalam kalangan penduduk Sarawak.'
- '[triangular-flag] Reaksi terhadap penyerahan Sarawak membuktikan bahawa rakyat tempatan semakin sedar akan hak mereka dan
  semakin berani mempertahankan masa depan negeri sendiri.'
- '[prohibited] Pengkhianatan terhadap hak rakyat Sarawak'
- '[globe_meridians] Bentuk penjajahan baharu'
- '[warning] Pelanggaran terhadap Perlembagaan 1941'
