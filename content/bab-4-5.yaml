- tajuk: Faktor Penentangan Penyerahan Sarawak
  label: Bahagian Kedua
  desc: ''
  kandungan:
  - jenis: accordion
    items:
    - tajuk: Tindakan Vyner Brooke Bertentangan dengan Perlembagaan 1941
      senarai:
      - '[pushpin] [Prinsip Kelapan Perlembagaan 1941]{istilah} menyatakan bahawa [Sarawak]{tempat} akan diberikan pemerintahan
        sendiri.'
      - '[warning] Namun, tindakan [Vyner Brooke]{tokoh} menyerahkan Sarawak kepada British telah melanggar prinsip tersebut.'
      - '[light_bulb] Hal ini bermaksud hak rakyat Sarawak untuk berkerajaan sendiri telah dinafikan.'
      - '[teacher] Rakyat Sarawak akan dibimbing untuk mentadbir negeri mereka sendiri'
    - tajuk: Vyner Brooke Mengetepikan Surat Wasiat Charles Brooke
      senarai:
      - '[pushpin] [Vyner Brooke]{tokoh} membuat keputusan menyerahkan Sarawak tanpa berunding dengan:'
      - '[light_bulb] Golongan antipenyerahan mahu memulihkan pemerintahan Dinasti Brooke kerana mereka berpendapat cara ini
        akan memudahkan usaha menuntut kemerdekaan.'
      - '[person] Anthony Brooke'
      - '[person] Bertram Brooke'
    - tajuk: Gerard T. MacBryan Menggunakan Muslihat
      senarai:
      - '[pushpin] [Gerard T. MacBryan]{tokoh} menggunakan pelbagai cara untuk mendapatkan persetujuan ketua tempatan, seperti:'
      - '[light_bulb] Cara ini menimbulkan kemarahan penduduk tempatan kerana dianggap tidak jujur dan tidak menghormati rakyat
        Sarawak.'
      - '[angry-face] Tekanan'
      - '[megaphone] Desakan'
      - '[handshake_light] Pujukan'
      - '[money-bag] Sogokan'
- tajuk: Bentuk Penentangan Penduduk Tempatan
  label: Bahagian Ketiga
  desc: ''
  kandungan:
  - jenis: board
    tajuk: Rayuan Anthony Brooke
    strip: true
    senarai:
    - '[pushpin] [Anthony Brooke]{tokoh} turut menentang penyerahan Sarawak melalui saluran perundangan.'
    - '[pushpin] Beliau membuat rayuan di [Privy Council]{istilah}.'
    - '[pushpin] [16 Julai 1948]{masa} → beliau membawa kes ini ke Mahkamah Tinggi Brunei.'
  - jenis: accordion
    items:
    - tajuk: Mengadakan Persidangan
      senarai:
      - '[pushpin] [Johari Anang]{tokoh} dan [Sharkawi Osman]{tokoh} menganjurkan satu persidangan yang dihadiri oleh wakil
        dari seluruh Sarawak.'
      - '[pushpin] Pengerusinya ialah [Johari Anang]{tokoh}.'
      - '[magnify_left] Orang Dayak turut menubuhkan [Sarawak Dayak Association (SDA)]{pertubuhan} yang mempunyai kira-kira
        500 orang ahli.'
      - '[calendar] Mengadakan demonstrasi pada setiap 1 Julai'
      - '[prohibited] Menentang penyerahan Sarawak kepada British'
    - tajuk: Mengadakan Demonstrasi
      senarai:
      - '[pushpin] Pada [30 Oktober 1946]{masa}, demonstrasi pertama diadakan semasa ketibaan Gabenor pertama Sarawak, [Charles
        Arden Clarke]{tokoh}, di [Astana]{tempat}.'
      - '[pushpin] Demonstrasi ini diketuai oleh [Datu Patinggi Abang Haji Abdillah]{tokoh}.'
      - '[pushpin] Perarakan ini disertai oleh 16 persatuan Melayu.'
      - '[pushpin] Sepanduk dan poster antipenyerahan turut ditampal pada pokok, perahu dan jeti.'
      - '[pushpin] Demonstrasi di [Sibu]{tempat} pula dipimpin oleh [Pergerakan Pemuda Melayu (PPM)]{pertubuhan}.'
      - '[light_bulb] Beberapa demonstrasi berjaya diadakan dan menunjukkan penolakan yang berterusan terhadap penyerahan
        Sarawak.'
      - '[megaphone] “Sarawak adalah hak kami”'
      - '[megaphone] “Leburkan kolonial”'
      - '[megaphone] “No Cession”'
    - tajuk: Meletakkan Jawatan Beramai-ramai
      senarai:
      - '[pushpin] British menyedari bahawa gerakan antipenyerahan dipimpin oleh guru dan pegawai perkhidmatan awam.'
      - '[pushpin] Pada [Disember 1946]{masa}, British mengeluarkan [Pekeliling No. 9/1946 (Circular No. 9)]{istilah} yang
        melarang pegawai awam menyertai gerakan antipenyerahan.'
      - '[pushpin] Pada [2 April 1947]{masa}, seramai 409 orang kakitangan kerajaan meletakkan jawatan sebagai bantahan.'
      - '[pushpin] Selain itu, seramai 56 orang pelajar Maktab Perguruan Melayu Sarawak turut menamatkan pengajian sebagai
        tanda bantahan.'
      - '[post-office] Pos dan Telegraf'
      - '[anchor] Marin'
      - '[money-bag] Kastam'
      - '[hospital] Perubatan dan Kesihatan'
      - '[printer] Percetakan'
      - '[straight-ruler] Tanah dan Ukur'
      - '[building-construction] Kerja Raya'
      - '[fire-engine] Bomba'
      - '[briefcase] Perbendaharaan'
    - tajuk: Bantahan Golongan Wanita
      senarai:
      - '[pushpin] Golongan wanita memainkan peranan yang sangat penting dalam gerakan antipenyerahan.'
      - '[pushpin] [Cikgu Lily Eberwein]{tokoh} mengetuai kaum ibu mengadakan kempen kesedaran di rumah panjang.'
      - '[pushpin] Cikgu Ajibah Abol pula menggerakkan kaum wanita supaya bergabung dalam perjuangan menuntut kemerdekaan
        Sarawak.'
      - '[person] Cikgu Lily Eberwein'
      - '[person] Hajah Sipah Tuanku Othman'
      - '[person] Dayang Fauziah'
      - '[person] Cikgu Ajibah Abol'
    - tajuk: Menggunakan Akhbar
      senarai:
      - '[pushpin] Pada [Januari 1949]{masa}, gerakan antipenyerahan mendapat nafas baharu apabila akhbar [Utusan Sarawak]{istilah}
        mula diterbitkan.'
      - '[loudspeaker] Menyebarkan bantahan'
      - '[writing-hand] Mengkritik rancangan penyerahan'
      - '[prohibited] Menyerang dasar British secara terbuka'
    - tajuk: Menulis Surat Bantahan
      senarai:
      - '[pushpin] [Pergerakan Pemuda Melayu (PPM)]{pertubuhan} menghantar surat kepada kerajaan British di London untuk menyatakan
        bantahan terhadap penjajahan Sarawak.'
      - '[pushpin] Pada [1949]{masa}, [Barisan Pemuda Sarawak (BPS)]{pertubuhan} menghantar referendum untuk memansuhkan penyerahan
        Sarawak.'
      - '[pushpin] Mereka juga menghantar surat bantahan kepada [Clement Attlee]{tokoh}, Perdana Menteri British, dengan salinannya
        kepada Gabenor.'
      - '[pushpin] [Anthony Brooke]{tokoh} turut menentang penyerahan Sarawak melalui saluran perundangan.'
      - '[pushpin] Beliau membuat rayuan di [Privy Council]{istilah}.'
      - '[pushpin] [16 Julai 1948]{masa} → beliau membawa kes ini ke Mahkamah Tinggi Brunei.'
      - '[warning] Namun, rayuan tersebut ditolak.'
    - tajuk: Menubuhkan Kumpulan Rukun 13
      senarai:
      - '[pushpin] Pada [20 Ogos 1948]{masa}, golongan muda dalam gerakan antipenyerahan menubuhkan [Rukun 13]{pertubuhan}.'
      - '[pushpin] Kumpulan ini ditubuhkan secara sulit oleh pemimpin PPM di [Sibu]{tempat}.'
      - '[person] Awang Rambli'
      - '[person] Morshidi Sidek'
      - '[person] Bujang Suntong'
