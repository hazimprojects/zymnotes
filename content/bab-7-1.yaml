description: 'Nota Sejarah Tingkatan 4 Bab 7.1 (Usaha ke Arah Kemerdekaan): Latar Belakang Idea Negara Merdeka. Ringkasan
  padat untuk ulang kaji SPM.'
lead: Subtopik ini menerangkan bagaimana idea [negara merdeka]{istilah} mula berkembang di negara kita melalui perjuangan
  pelbagai [pertubuhan]{pertubuhan} dan [tokoh]{tokoh} yang membawa ideologi serta pendekatan masing-masing, daripada konsep
  [Melayu Raya]{gerakan} hingga kepada [demokrasi]{istilah}, [negara Islam]{istilah} dan [perpaduan antara kaum]{istilah}.
ringkasan:
- '[light_bulb] Perkembangan politik antarabangsa dan serantau telah mempengaruhi gelombang politik di negara kita sehingga
  benih kesedaran politik berkembang menjadi idea negara merdeka.'
- '[classical_building] Idea negara merdeka tidak lahir daripada satu pertubuhan sahaja, tetapi berkembang melalui perjuangan
  pelbagai [pertubuhan]{pertubuhan} dan [tokoh]{tokoh} dengan pendekatan yang berbeza.'
- '[globe-showing-europe-africa] Antara idea yang diperjuangkan termasuk [Melayu Raya]{gerakan}, [demokrasi]{istilah}, [negara
  Islam]{istilah} dan [perpaduan antara kaum]{istilah}.'
soalan_utama:
  soalan: Bagaimanakah idea negara merdeka mula berkembang di negara kita?
  heading: Bagaimanakah idea negara merdeka mula berkembang di negara kita?
  jawapan:
  - '[light_bulb] Idea negara merdeka berkembang hasil pengaruh perkembangan politik antarabangsa dan serantau serta kesedaran
    politik dalam kalangan penduduk tempatan.'
  - '[pushpin] Idea ini dibawa oleh pelbagai pertubuhan dan tokoh yang memperjuangkan kemerdekaan melalui ideologi dan pendekatan
    yang berbeza, tetapi menuju kepada matlamat yang sama.'
