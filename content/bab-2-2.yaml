- '[globe-showing-europe-africa] [Nasionalisme]{istilah} di [Barat]{tempat} muncul sebagai tindak balas terhadap pemerintahan
  beraja yang menindas hak rakyat.'
- '[scales] Perjuangan ini berkembang untuk menuntut kedaulatan rakyat dan kebebasan daripada penjajahan atau pemerintahan
  mutlak.'
- '[scroll_old] Tiga [revolusi penting]{peristiwa} yang membentuk idea nasionalisme Barat ialah [Revolusi Keagungan]{peristiwa},
  [Revolusi Amerika]{peristiwa} dan [Revolusi Perancis]{peristiwa}.'
- '[fire] Idea ini kemudiannya menjadi inspirasi kepada kebangkitan nasionalisme di bahagian lain dunia, termasuk di [Asia]{tempat}
  dan [Asia Tenggara]{tempat}.'
