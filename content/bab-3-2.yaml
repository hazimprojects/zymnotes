    strip: true
    senarai:
    - '[pushpin] [Revolusi Industri]{istilah} menyebabkan negara-negara Eropah berlumba-lumba mendapatkan tanah jajahan.'
    - '[pushpin] Tujuan utama mereka ialah mendapatkan bahan mentah dan memasarkan hasil industri ke kawasan jajahan.'
  - jenis: board
    tajuk: Glosari
    strip: true
