    items:
    - tajuk: 28 Julai 1914
      senarai:
      - '[backhand-index-pointing-right] Austria-Hungary mengisytiharkan perang terhadap Serbia.'
      - '[crossed_swords] mahu membalas pembunuhan Archduke Ferdinand'
      - '[handshake_light] mendapat sokongan daripada Jerman'
    - tajuk: 30 Julai 1914
      senarai:
      - '[backhand-index-pointing-right] Rusia memberikan bantuan kepada Serbia.'
      - '[magnify_left] Bangsa Rusia dan Serbia mempunyai hubungan rapat kerana kedua-duanya berasal daripada rumpun [Slav]{istilah}.'
      - '[shield] Rusia menyokong bangsa Slav di Serbia'
      - '[warning] Rusia menentang tindakan Austria-Hungary'
    - tajuk: 1 Ogos 1914
      senarai:
      - '[backhand-index-pointing-right] Jerman mengisytiharkan perang terhadap Rusia.'
      - '[handshake_light] mahu mempertahankan Austria-Hungary'
      - '[crossed_swords] mahu menyerang lebih awal sebelum Rusia sempat bersiap'
    - tajuk: 3 Ogos 1914
      senarai:
      - '[backhand-index-pointing-right] Jerman mengisytiharkan perang terhadap Perancis.'
      - '[pushpin] Rancangan ini dikenali sebagai [Pelan Schlieffen]{istilah}.'
      - '[backhand-index-pointing-right] Jerman juga menceroboh [Belgium]{tempat} untuk menyerang Perancis dari arah utara
        kerana laluan itu paling cepat.'
      - '[handshake_light] Rusia dan Perancis merupakan sekutu'
      - '[warning] Jerman bimbang diserang dari dua arah'
      - '[map] mahu melumpuhkan Perancis terlebih dahulu sebelum memberi tumpuan kepada Rusia'
    - tajuk: 4 Ogos 1914
      senarai:
      - '[backhand-index-pointing-right] Britain mengisytiharkan perang terhadap Jerman.'
      - '[magnify_left] Jerman bukan sekadar melalui Belgium, tetapi menyerangnya dengan kekerasan. Tindakan ini membangkitkan
        kemarahan Britain.'
      - '[warning] Britain marah kerana Jerman melanggar kedaulatan Belgium'
      - '[scroll_old] Belgium ialah negara berkecuali yang dijamin oleh perjanjian antarabangsa'
    - tajuk: Oktober 1914
      senarai:
      - '[backhand-index-pointing-right] Empayar Uthmaniyah menyertai Kuasa Tengah.'
      - '[shield] mahu mempertahankan wilayah sendiri'
      - '[handshake_light] bekerjasama dengan Jerman menentang musuh bersama'
    - tajuk: Mac 1915
      senarai:
      - '[backhand-index-pointing-right] Itali menyertai Pakatan Bertiga.'
      - '[repeat-button] walaupun asalnya bersama Kuasa Tengah, Itali berpaling tadah'
      - '[national-park] Britain dan Perancis menjanjikan wilayah kepada Itali'
    - tajuk: April 1917
      senarai:
      - '[backhand-index-pointing-right] Amerika Syarikat menyertai Pakatan Bertiga.'
      - '[ship] marah selepas kapal dagangnya diserang oleh kapal selam Jerman'
      - '[statue-of-liberty] mahu mempertahankan demokrasi dunia'
