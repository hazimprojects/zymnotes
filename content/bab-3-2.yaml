    tajuk: C. Krisis Rantau Balkan
    strip: true
    senarai:
    - '[pushpin] Krisis di [Rantau Balkan]{tempat} menjadi pencetus langsung kepada [Perang Dunia Pertama]{peristiwa}.'
    - '[pushpin] [Austria-Hungary]{tempat} menuduh [Serbia]{tempat} menghasut rakyat berketurunan Serb untuk membebaskan diri
      daripada pemerintahannya.'
    - '[pushpin] Kemuncaknya berlaku apabila [Archduke Ferdinand]{tokoh}, Putera Mahkota Austria-Hungary, dan isterinya [Sophie]{tokoh}
      dibunuh oleh seorang pemuda Serbia.'
- tajuk: Pihak yang Terlibat
  label: Bahagian Kedua
  desc: ''
  kandungan:
  - jenis: board
    tajuk: Panduan warna pihak perang
    strip: true
    senarai: []
  - jenis: accordion
    items:
    - tajuk: Kuasa Tengah
      senarai:
      - '[pushpin] Kuasa Tengah terdiri daripada negara yang mahu mengekalkan empayar masing-masing dan terlibat dalam konflik
        akibat persaingan imperialis.'
      - '[magnify_left] Ditubuhkan pada [1882]{tahun} sebagai [Triple Alliance]{istilah}.'
      - '[pushpin] Pada awalnya melibatkan Jerman, Austria-Hungary dan Itali.'
      - '[pushpin] Namun, Itali kemudian berpaling tadah dan menyertai Pakatan Bertiga.'
      - '[pushpin] Pakatan ini lemah kerana kedudukan geografi yang mencabar dan matlamat yang tidak sepenuhnya seragam.'
      - '[pushpin] Empayar Uthmaniyah pula menyertai perang untuk mempertahankan wilayahnya dan kepentingan dunia Islam.'
      - '[globe_meridians] Jerman'
      - '[globe_meridians] Austria-Hungary'
    - tajuk: Pakatan Bertiga
      senarai:
      - '[pushpin] Pakatan Bertiga dibentuk untuk mengimbangi ancaman Kuasa Tengah.'
      - '[magnify_left] Bermula daripada perjanjian diplomatik antara Perancis dan Rusia pada [1894]{tahun}.'
      - '[pushpin] Britain menyertai pakatan ini pada [1907]{tahun}.'
      - '[pushpin] Pakatan ini mempunyai lebih banyak tanah jajahan dan sumber.'
      - '[pushpin] Amerika Syarikat membantu pada akhir perang, tetapi bukan anggota rasmi pakatan.'
      - '[globe_meridians] Britain'
      - '[globe_meridians] Perancis'
      - '[globe_meridians] Rusia'
