lead: Subtopik ini menerangkan punca berlakunya [Perang Dunia Pertama]{peristiwa} serta kesan besarnya terhadap dunia. Peperangan
  ini tercetus akibat perkembangan [nasionalisme]{gerakan} di Eropah, persaingan [kuasa imperialis]{istilah}, pembentukan
  [pakatan ketenteraan]{istilah} dan krisis di [Rantau Balkan]{tempat}.
ringkasan:
- '[globe-showing-europe-africa] [Perang Dunia Pertama]{peristiwa} tercetus akibat persaingan [kuasa imperialis]{istilah},
  pembentukan [pakatan ketenteraan]{istilah} dan krisis di [Rantau Balkan]{tempat}.'
- '[crossed_swords] Perang bermula pada [1914]{tahun} dan berakhir pada [1918]{tahun}, tetapi kesannya berlarutan hingga mencetuskan
  ketegangan baharu.'
- '[scroll_old] Selepas perang, [Persidangan Damai Paris]{perjanjian}, [Deklarasi 14 Perkara]{perjanjian} dan [Perjanjian
  Versailles]{perjanjian} membentuk susunan dunia baharu.'
- '[hibiscus] Walaupun perang berlaku jauh di [Eropah]{tempat}, [Tanah Melayu]{tempat} turut menerima kesan politik dan ekonomi.'
soalan_utama:
  soalan: Apakah punca berlakunya Perang Dunia?
  heading: Apakah punca berlakunya Perang Dunia?
  jawapan:
  - '[light_bulb] Perkembangan nasionalisme di Eropah serta persaingan imperialis antara kuasa besar telah mencetuskan dua
    peperangan besar dunia, iaitu [Perang Dunia Pertama]{peristiwa} ([1914–1918]{tahun}) dan [Perang Dunia Kedua]{peristiwa}
    ([1939–1945]{tahun}).'
  - '[pushpin] Kedua-dua peperangan ini membawa kesan besar kepada dunia, termasuk [Tanah Melayu]{tempat}.'
fokus: 'Perang Dunia Pertama (1914–1918): konflik besar yang mengubah politik dunia. Lima perkara:'
