  soalan: Adakah konsep negara bangsa hanya wujud selepas kedatangan Barat?
  heading: Adakah konsep negara bangsa hanya wujud selepas kedatangan Barat?
  jawapan:
  - '[light_bulb] Tidak. Asas [negara bangsa]{istilah} telah wujud lebih awal di [Alam Melayu]{tempat} melalui kemunculan
    [kerajaan]{kerajaan} yang kuat dan berpengaruh.'
fokus: 'Negara bangsa di Alam Melayu sudah wujud sebelum Barat tiba, terbina secara berperingkat. Empat perkara utama:'
