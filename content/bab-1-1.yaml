      - '[pushpin] Kesinambungan ini menjadikan [Srivijaya]{kerajaan} sebagai empayar yang terkenal di [Alam Melayu]{tempat}.'
    - tajuk: Kesultanan Melayu Melaka
      senarai:
      - '[pushpin] Ciri-ciri ini diwarisi oleh [Kesultanan Melayu Melaka]{kerajaan} dan seterusnya memperkukuh sistem [negara
        bangsa]{istilah}.'
    - tajuk: Kesultanan Johor-Riau
      senarai:
      - '[pushpin] [Kesultanan Johor-Riau]{kerajaan} meneruskan tradisi [negara bangsa]{istilah} dengan menekankan kepentingan
        [Islam]{istilah}.'
