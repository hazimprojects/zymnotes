    items:
    - tajuk: Funan & Champa
      senarai:
      - '[pushpin] Kerajaan awal yang menunjukkan perkembangan ciri-ciri negara bangsa di Alam Melayu.'
    - tajuk: Srivijaya
      senarai:
      - '[pushpin] [Kerajaan Srivijaya]{kerajaan} yang berpusat di [Palembang]{tempat} meneruskan ciri-ciri [negara bangsa]{istilah}
