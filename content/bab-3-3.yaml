      - '[fuel-pump] kekurangan minyak'
      - '[bread] kehabisan makanan'
      - '[disappointed-face] semangat tentera semakin lemah'
kesimpulan:
- '[pushpin] [Perang Dunia Kedua]{peristiwa} di Eropah tercetus akibat:'
- '[pushpin] Peperangan ini menyaksikan kebangkitan kuasa agresif seperti Jerman dan Itali yang menggunakan peperangan untuk
  meluaskan pengaruh.'
- '[pushpin] Namun, perang akhirnya berakhir apabila:'
- '[light_bulb] Kemenangan Kuasa Bersekutu di Eropah membolehkan mereka memberi tumpuan kepada peperangan di [Asia Pasifik]{tempat}
  dalam usaha menghadapi kemaraan tentera Jepun.'
- '[fire] kemunculan ideologi baharu seperti [Fasisme]{gerakan} dan [Nazisme]{gerakan}'
- '[angry-face] ketidakpuasan hati terhadap [Perjanjian Versailles]{perjanjian}'
- '[dove] kegagalan [Liga Bangsa-Bangsa]{pertubuhan}'
