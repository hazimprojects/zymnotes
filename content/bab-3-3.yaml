lead: Subtopik ini menerangkan mengapa [Perang Dunia Kedua]{peristiwa} tercetus di [Eropah]{tempat} dan [Asia Pasifik]{tempat}.
  Perang ini berpunca daripada kemunculan ideologi baharu, ketidakpuasan hati terhadap [Perjanjian Versailles]{perjanjian}
  dan kegagalan [Liga Bangsa-Bangsa]{pertubuhan} mengekalkan keamanan dunia.
ringkasan:
- '[collision] [Perang Dunia Kedua]{peristiwa} berlaku antara [1939]{tahun} hingga [1945]{tahun} dan melibatkan dua medan
  utama, iaitu [Eropah dan Afrika Utara]{tempat} serta [Asia dan Asia Tenggara]{tempat}.'
- '[fire] Perang ini tercetus akibat kemunculan ideologi baharu seperti [Fasisme]{gerakan} dan [Nazisme]{gerakan}, ketidakpuasan
  terhadap [Perjanjian Versailles]{perjanjian} dan kegagalan [Liga Bangsa-Bangsa]{pertubuhan}.'
- '[crossed_swords] Dua pihak utama yang terlibat ialah Kuasa Paksi dan Kuasa Bersekutu.'
- '[tornado] Di Eropah, Jerman menggunakan strategi [Blitzkrieg]{istilah} untuk menakluki banyak negara dengan pantas.'
- '[dove] Perang di Eropah berakhir pada [April 1945]{tahun} selepas Kuasa Bersekutu berjaya melalui kerjasama kuasa besar
  dan keberkesanan strategi serangan balas.'
soalan_utama:
  soalan: Mengapakah Perang Dunia Kedua tercetus di Eropah dan bagaimana peperangan itu berakhir di benua tersebut?
  heading: Mengapakah Perang Dunia Kedua tercetus di Eropah dan bagaimana peperangan itu berakhir di benua tersebut?
  jawapan:
  - '[light_bulb] [Perang Dunia Kedua]{peristiwa} berlaku antara tahun [1939]{tahun} hingga [1945]{tahun} dan melibatkan dua
    medan utama, iaitu [Eropah dan Afrika Utara]{tempat} serta [Asia dan Asia Tenggara]{tempat}.'
  - '[pushpin] Perang ini tercetus akibat gabungan kemunculan ideologi baharu, ketidakpuasan hati terhadap [Perjanjian Versailles]{perjanjian}
    dan kegagalan [Liga Bangsa-Bangsa]{pertubuhan} mengekalkan keamanan dunia.'
