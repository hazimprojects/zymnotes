sinopsis:
- '[globe_meridians] Konflik dunia yang merangkumi [Perang Dunia Pertama]{peristiwa} dan [Perang Dunia Kedua]{peristiwa} tercetus
  akibat perkembangan [imperialisme]{gerakan} dan [nasionalisme]{gerakan} dalam persaingan merebut kuasa politik dan ekonomi.'
- '[crossed_swords] Perang dunia bermula di [Eropah]{tempat}, kemudian merebak ke [Asia Pasifik]{tempat}.'
- '[sushi] Pemerintahan tentera Jepun di negara kita telah mencetuskan tindak balas rakyat terhadap pendudukan asing.'
- '[fire] Pendudukan Jepun turut menyemarakkan perkembangan [nasionalisme]{gerakan} tempatan.'
subtopik:
- kod: '3.1'
  tajuk: Nasionalisme di Negara Kita Sebelum Perang Dunia
  penerangan: Kesedaran nasionalisme di negara kita sebelum tercetusnya konflik dunia.
- kod: '3.2'
  tajuk: Latar Belakang Perang Dunia
  penerangan: Punca dan faktor utama yang membawa kepada konflik dunia.
- kod: '3.3'
  tajuk: Perang Dunia Kedua
  penerangan: Perkembangan Perang Dunia Kedua dan kuasa-kuasa yang terlibat.
- kod: '3.4'
  tajuk: Perang Dunia Kedua di Asia Pasifik
  penerangan: Perkembangan perang apabila konflik meluas ke rantau Asia Pasifik.
- kod: '3.5'
  tajuk: Faktor Kedatangan Jepun ke Negara Kita
  penerangan: Sebab-sebab kedatangan Jepun ke Tanah Melayu dan wilayah sekitarnya.
- kod: '3.6'
  tajuk: Dasar Pendudukan Jepun di Negara Kita
  penerangan: Dasar pemerintahan tentera Jepun dan kesannya terhadap kehidupan rakyat.
- kod: '3.7'
  tajuk: Perjuangan Rakyat Menentang Pendudukan Jepun
  penerangan: Bentuk penentangan rakyat tempatan terhadap pendudukan Jepun.
- kod: '3.8'
  tajuk: Perkembangan Gerakan Nasionalisme Tempatan dan Pendudukan Jepun
  penerangan: Hubungan antara pendudukan Jepun dengan perkembangan gerakan nasionalisme tempatan.
- kod: '3.9'
  tajuk: Keadaan Negara Kita Selepas Kekalahan Jepun
  penerangan: Keadaan politik dan keselamatan negara selepas Jepun menyerah kalah.
