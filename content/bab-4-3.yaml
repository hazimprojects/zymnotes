- tajuk: Cara Bantahan Raja-raja Melayu
  label: Bahagian Kedua
  desc: ''
  kandungan:
  - jenis: accordion
    items:
    - tajuk: Membawa Kes Malayan Union ke Mahkamah Tinggi England
      senarai:
      - '[pushpin] Dalam [Persidangan Raja-raja Melayu]{istilah} di [Istana Iskandariah, Kuala Kangsar]{tempat} pada [April
        1946]{masa}, Raja-raja Melayu memutuskan untuk membawa bantahan terhadap [Malayan Union]{pentadbiran} ke Mahkamah
        Tinggi di [England]{tempat}.'
      - '[light_bulb] Menurut sistem perundangan British, cara [MacMichael]{tokoh} mendapatkan persetujuan Raja-raja Melayu
        dianggap tidak sah.'
      - '[crown] Sultan Perak'
      - '[crown] Sultan Kedah'
      - '[crown] Sultan Johor'
    - tajuk: Menghantar Surat Bantahan ke London
      senarai:
      - '[pushpin] [Sultan Kedah]{tokoh}, [Sultan Perak]{tokoh} dan [Sultan Johor]{tokoh} mengutus surat bantahan kepada [George
        Henry Hall]{tokoh}.'
      - '[pushpin] Mereka memohon agar British membatalkan perjanjian yang telah ditandatangani.'
      - '[pushpin] [Tuanku Syed Putra Jamalullail]{tokoh} juga mengirimkan telegram ke [London]{tempat} kerana baginda tidak
        diberi peluang mendapatkan nasihat pembesar negeri terlebih dahulu.'
      - '[warning] Diperdaya oleh MacMichael'
      - '[angry-face] Diugut supaya menurunkan tandatangan'
      - '[scroll_old] Dipaksa bersetuju tanpa memahami kesannya'
    - tajuk: Menyokong Kongres Melayu
      senarai:
      - '[pushpin] Raja-raja Melayu turut menyokong [Kongres Melayu]{istilah} yang diadakan untuk menunjukkan kesungguhan
        menolak [Malayan Union]{pentadbiran}.'
      - '[pushpin] [Sultan Hisamuddin Alam Shah]{tokoh} menderma wang kepada [Persatuan Melayu Selangor]{pertubuhan}.'
      - '[light_bulb] Baginda juga merasmikan pembukaan Kongres Melayu Pertama. Hal ini menunjukkan bahawa Raja-raja Melayu
        bersama-sama dengan rakyat dalam menentang Malayan Union.'
    - tajuk: Permaisuri Perak Memimpin Gerakan Menentang Malayan Union
      senarai:
      - '[pushpin] Pada [28 Mei 1946]{masa}, Ahli Parlimen British tiba di [Kuala Kangsar, Perak]{tempat}, tempat [Sultan
        Iskandar Shah]{tokoh} bersemayam.'
      - '[pushpin] Satu perhimpunan besar-besaran diadakan di [Padang Bandar Diraja Kuala Kangsar]{tempat}.'
      - '[light_bulb] Dalam perhimpunan ini, [Tuanku Permaisuri Perak, Raja Perempuan Kelsom]{tokoh} mengetuai barisan hadapan
        perarakan bersama wanita Perak.'
      - '[light_bulb] Peristiwa ini memperlihatkan gabungan raja dan rakyat dalam menentang Malayan Union.'
    - tajuk: Memulaukan Upacara Pelantikan Gabenor Malayan Union
      senarai:
      - '[pushpin] Raja-raja Melayu memutuskan untuk memulaukan upacara pelantikan Gabenor Malayan Union selepas pertemuan
        dengan [Dato’ Onn Jaafar]{tokoh} di [Hotel Station]{tempat}.'
      - '[pushpin] Dato’ Onn mempersembahkan resolusi Kongres Melayu yang memohon Raja-raja Melayu bersama rakyat memboikot
        upacara pelantikan Gabenor Malayan Union.'
      - '[pushpin] Raja-raja Melayu kemudian memulaukan pelantikan [Sir Edward Gent]{tokoh}.'
      - '[light_bulb] Tindakan ini membuktikan ketegasan Raja-raja Melayu menolak Malayan Union.'
      - '[megaphone] “Daulat Tuanku!”'
      - '[megaphone] “Hidup Melayu!”'
