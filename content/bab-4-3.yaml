  - jenis: accordion
    items:
    - tajuk: Bantahan Akhbar Melayu
      senarai:
      - '[pushpin] Akhbar Melayu memainkan peranan penting dalam menyebarkan bantahan terhadap [Malayan Union]{pentadbiran}.'
      - '[light_bulb] Akhbar Melayu membangkitkan kesedaran nasionalisme dan mendorong orang Melayu bangkit mempertahankan
        hak mereka.'
      - '[rolled-up-newspaper] Utusan Melayu'
      - '[rolled-up-newspaper] Majlis'
      - '[rolled-up-newspaper] Warta Negara'
    - tajuk: Bantahan Golongan Cendekiawan
      senarai:
      - '[pushpin] Beberapa pemimpin Melayu memainkan peranan besar dalam menggerakkan penentangan terhadap Malayan Union,
        antaranya:'
      - '[pushpin] Mereka menggunakan pelbagai strategi untuk membangkitkan kesedaran dan menyatukan orang Melayu menentang
        British.'
      - '[pushpin] Golongan wanita juga berada di barisan hadapan dalam gerakan menentang Malayan Union.'
      - '[pushpin] Di [Batu Pahat]{tempat}, [Cikgu Zaharah Abdullah]{tokoh} dengan tegas menyatakan bahawa kaum wanita akan
        turut sama berjuang untuk mendapatkan semula hak mereka.'
      - '[light_bulb] Hal ini membuktikan bahawa penentangan terhadap Malayan Union melibatkan seluruh lapisan masyarakat,
        termasuk wanita.'
      - '[person] Dato’ Onn Jaafar'
      - '[person] Dato’ Nik Ahmad Kamil'
      - '[person] Za’ba'
      - '[person] Tengku Mohamed'
      - '[person] Dato’ Abdul Wahab Abdul Aziz (Panglima Bukit Gantang)'
      - '[person] Wan Md Yussof (Panglima Kinta, Perak)'
      - '[person] Dato’ Hamzah Abdullah'
      - '[person] Dato’ Abdul Rahman Mohammad Yassin'
    - tajuk: Bantahan Persatuan Melayu
      senarai:
      - '[pushpin] Persatuan Melayu berjaya menghimpunkan orang Melayu dari seluruh negara untuk menentang [Malayan Union]{pentadbiran}.'
      - '[light_bulb] Pertubuhan ini menjadi penggerak utama rapat umum dan bantahan terhadap tindakan [MacMichael]{tokoh}
        serta gagasan [Malayan Union]{pentadbiran}.'
      - '[classical_building] SABERKAS'
      - '[classical_building] Persatuan Melayu Kedah'
      - '[classical_building] Perikatan Melayu Perak'
      - '[classical_building] Persatuan Melayu Selangor'
      - '[classical_building] Persatuan Melayu Johor'
