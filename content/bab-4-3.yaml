description: 'Nota Sejarah Tingkatan 4 Bab 4.3 (Era Peralihan Kuasa British di Negara Kita): Reaksi Penduduk Tempatan terhadap
  Malayan Union. Ringkasan padat untuk ulang kaji SPM.'
lead: Subtopik ini menerangkan bagaimana [Raja-raja Melayu]{tokoh}, orang Melayu, persatuan Melayu, akhbar, golongan cendekiawan
  dan penduduk tempatan bertindak balas terhadap [Malayan Union]{pentadbiran} yang dianggap mengancam kedaulatan [Tanah Melayu]{tempat}.
ringkasan:
- '[raised_fist] Pengisytiharan [Malayan Union]{pentadbiran} pada [1 April 1946]{masa} mencetuskan penentangan yang hebat
  daripada [Raja-raja Melayu]{tokoh}, orang Melayu, persatuan Melayu dan beberapa bekas pegawai British.'
- '[crown] Penentangan berlaku kerana Malayan Union dianggap menghapuskan kedaulatan [Raja-raja Melayu]{tokoh} dan menjadi
  satu bentuk penjajahan baharu oleh British.'
- '[newspaper] Akhbar Melayu, golongan cendekiawan, wanita dan [persatuan Melayu]{pertubuhan} memainkan peranan penting dalam
  membangkitkan kesedaran dan menyatukan orang Melayu.'
- '[triangular-flag] Penentangan terhadap Malayan Union akhirnya membawa kepada penubuhan [UMNO]{pertubuhan} dan menjadi titik
  penting dalam perkembangan nasionalisme selepas perang.'
soalan_utama:
  soalan: Bagaimanakah Raja-raja Melayu, orang Melayu dan penduduk tempatan bertindak balas terhadap pelaksanaan Malayan Union?
  heading: Bagaimanakah Raja-raja Melayu, orang Melayu dan penduduk tempatan bertindak balas terhadap pelaksanaan Malayan
    Union?
  jawapan:
  - '[light_bulb] Pengisytiharan [Malayan Union]{pentadbiran} pada [1 April 1946]{masa} telah mencetuskan penentangan yang
    hebat, khususnya daripada [Raja-raja Melayu]{tokoh}, orang Melayu, persatuan Melayu dan juga beberapa bekas pegawai British
    yang pernah berkhidmat di [Tanah Melayu]{tempat}.'
