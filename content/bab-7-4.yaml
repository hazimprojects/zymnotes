lead: Subtopik ini menerangkan mengapa pembentukan [sistem pendidikan kebangsaan]{istilah} penting kepada negara kita, latar
  belakang sistem persekolahan sebelum merdeka, serta usaha melalui beberapa [laporan]{perjanjian} dan [ordinan]{perjanjian}
  untuk membina satu sistem pendidikan yang dapat memupuk [perpaduan]{istilah}, [identiti kebangsaan]{istilah} dan [taat setia
  kepada tanah air]{istilah}.
ringkasan:
- '[school] Semasa pentadbiran [British]{pertubuhan}, sistem persekolahan berkembang mengikut kaum dengan bahasa pengantar
  dan kurikulum yang berbeza.'
- '[chart-decreasing] Keadaan ini mewujudkan [jurang ekonomi dan sosial]{istilah}, menyukarkan pembentukan [perpaduan]{istilah}
  dan menghalang pembinaan satu [identiti bangsa]{istilah} yang sama.'
- '[blue-book] Oleh itu, beberapa [laporan]{perjanjian}, [ordinan]{perjanjian} dan [penyata]{perjanjian} diperkenalkan untuk
  membentuk sistem pendidikan kebangsaan di Tanah Melayu, Sarawak dan Sabah.'
soalan_utama:
  soalan: Mengapakah pembentukan sistem pendidikan kebangsaan penting kepada negara kita?
  heading: Mengapakah pembentukan sistem pendidikan kebangsaan penting kepada negara kita?
  jawapan:
  - '[light_bulb] Pembentukan sistem pendidikan kebangsaan penting kerana sistem persekolahan yang berasingan mengikut kaum
    telah mewujudkan jurang sosial dan ekonomi serta menyukarkan usaha menyatukan rakyat.'
  - '[pushpin] Oleh itu, satu sistem pendidikan yang lebih seragam diperlukan untuk memupuk perpaduan, membina identiti negara
    dan melahirkan taat setia kepada tanah air.'
