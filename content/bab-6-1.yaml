lead: Subtopik ini menerangkan bagaimana ideologi [komunis]{gerakan} mula masuk ke negara kita sejak [tahun 1920-an]{masa}
  melalui pengaruh dari [China]{tempat} dan [Indonesia]{tempat}, serta bagaimana penubuhan [Parti Komunis Malaya (PKM)]{pertubuhan}
  memperkukuhkan penyebaran fahaman tersebut.
ringkasan:
- '[triangular-flag] [Komunisme]{gerakan} ialah ideologi yang diasaskan oleh [Karl Marx]{tokoh} dan [Friedrich Engels]{tokoh}
  melalui karya [Communist Manifesto]{karya} dan [Das Kapital]{karya}.'
- '[calendar] Penyebaran ideologi ini di negara kita bermula sejak [tahun 1920-an]{masa} melalui pengaruh dari [China]{tempat}
  dan [Indonesia]{tempat}.'
- '[classical_building] Kemasukan pengaruh komunis berlaku melalui tiga saluran utama: dari [China]{tempat}, dari [Indonesia]{tempat}
  dan melalui penubuhan [Parti Komunis Malaya (PKM)]{pertubuhan}.'
- '[warning] Selepas [Perang Dunia Kedua]{peristiwa}, keadaan [kekosongan politik]{istilah} memberi peluang kepada [PKM]{pertubuhan}
  untuk meluaskan pengaruhnya.'
soalan_utama:
  soalan: Bagaimanakah ideologi komunis mula masuk dan berkembang di negara kita?
  heading: Bagaimanakah ideologi komunis mula masuk dan berkembang di negara kita?
  jawapan:
  - '[light_bulb] [Komunisme]{gerakan} ialah ideologi yang diasaskan oleh [Karl Marx]{tokoh} dan [Friedrich Engels]{tokoh}
    melalui karya [Communist Manifesto]{karya} dan [Das Kapital]{karya}.'
  - '[pushpin] Komunisme ialah fahaman politik yang menjadikan [ekonomi]{istilah} dan [barang pengguna]{istilah} sebagai milik
    negara sepenuhnya.'
  - '[pushpin] Penyebaran ideologi ini di negara kita bermula sejak [tahun 1920-an]{masa} melalui pengaruh dari [China]{tempat}
    dan [Indonesia]{tempat}.'
