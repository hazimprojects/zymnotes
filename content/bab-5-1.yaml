description: 'Nota Sejarah Tingkatan 4 Bab 5.1 (Persekutuan Tanah Melayu 1948): Latar Belakang Penubuhan Persekutuan Tanah
  Melayu 1948. Ringkasan padat untuk ulang kaji SPM.'
lead: Subtopik ini menerangkan mengapa [Persekutuan Tanah Melayu 1948]{pentadbiran} diperkenalkan untuk menggantikan [Malayan
  Union 1946]{pentadbiran} yang ditolak oleh penduduk tempatan, serta peranan [Jawatankuasa Kerja]{pertubuhan} dan [PUTERA-AMCJA]{pertubuhan}
  dalam proses tersebut.
ringkasan:
- '[classical_building] [Persekutuan Tanah Melayu 1948]{pentadbiran} diperkenalkan untuk menggantikan [Malayan Union 1946]{pentadbiran}
  yang ditolak oleh penduduk tempatan.'
- '[puzzle] [Jawatankuasa Kerja]{pertubuhan} dibentuk untuk merangka asas [Perjanjian Persekutuan Tanah Melayu]{perjanjian}.'
- '[raised_fist] Golongan nasionalis Melayu radikal membantah proses perundingan British yang dianggap tertutup dan tidak
  demokratik.'
- '[handshake_light] Gabungan [PUTERA-AMCJA]{pertubuhan} mengemukakan cadangan alternatif yang dikenali sebagai [Perlembagaan
  Rakyat]{perjanjian}.'
- '[loudspeaker] Walaupun cadangan ini ditolak oleh British, perjuangan mereka memperlihatkan usaha awal pelbagai golongan
  rakyat memikirkan bentuk negara merdeka yang lebih adil dan menyeluruh.'
soalan_utama:
  soalan: Mengapakah Persekutuan Tanah Melayu 1948 ditubuhkan, dan apakah peranan Jawatankuasa Kerja serta PUTERA-AMCJA dalam
    proses tersebut?
  heading: Mengapakah Persekutuan Tanah Melayu 1948 ditubuhkan, dan apakah peranan Jawatankuasa Kerja serta PUTERA-AMCJA dalam
    proses tersebut?
  jawapan:
  - '[light_bulb] [Persekutuan Tanah Melayu 1948]{pentadbiran} diperkenalkan untuk menggantikan [Malayan Union 1946]{pentadbiran}
    yang ditolak oleh penduduk tempatan.'
  - '[pushpin] Bagi tujuan itu, satu [Jawatankuasa Kerja]{pertubuhan} dibentuk untuk merangka [Perjanjian Persekutuan Tanah
    Melayu]{perjanjian}.'
  - '[pushpin] Dalam masa yang sama, golongan nasionalis Melayu radikal dan bukan Melayu turut mengemukakan cadangan alternatif
    yang dikenali sebagai [Perlembagaan Rakyat]{perjanjian}.'
bahagian:
- tajuk: Penubuhan Jawatankuasa Kerja
  label: Bahagian Pertama
  desc: ''
  kandungan:
  - jenis: board
    tajuk: ''
    strip: false
    senarai:
    - '[calendar] [25 Julai 1946]{masa} → [Jawatankuasa Kerja]{pertubuhan} ditubuhkan.'
    - '[bullseye] Matlamat penubuhan → membincangkan asas [Perjanjian Persekutuan Tanah Melayu 1948]{perjanjian}.'
  - jenis: board
    tajuk: Info
    strip: true
    senarai:
    - '[keycap_1] kerajaan pusat'
    - '[keycap_2] kerajaan negeri'
  - jenis: accordion
    items:
    - tajuk: Ahli Jawatankuasa Kerja · Wakil UMNO
      senarai:
      - '[person] 1. [Dato’ Onn Jaafar]{tokoh}'
      - '[person] 2. [Dato’ Abdul Rahman Mohd Yassin]{tokoh}'
      - '[person] 3. [Haji Megat Yunus]{tokoh}'
    - tajuk: Ahli Jawatankuasa Kerja · Wakil Kerajaan British
      senarai:
      - '[person] 1. [A.T. Newboult]{tokoh} – Ketua Setiausaha [Malayan Union]{pentadbiran}'
      - '[person] 2. [K.K. O’Connor]{tokoh} – Peguam Negara [Malayan Union]{pentadbiran}'
      - '[person] 3. [W.D. Godsall]{tokoh} – Setiausaha Kewangan'
      - '[person] 4. [Dr. W. Linchan]{tokoh} – Ahli [MCS (Malayan Civil Service)]{pertubuhan}'
      - '[person] 5. [A. Williams]{tokoh} – Ahli [MCS]{pertubuhan}'
      - '[person] 6. [D.C. Watherston]{tokoh} – Setiausaha'
    - tajuk: Ahli Jawatankuasa Kerja · Wakil Raja-raja Melayu
      senarai:
      - '[person] 1. [Raja Kamaralzaman Raja Ngah Mansur]{tokoh} – Raja Kecil Tengah Perak'
      - '[person] 2. [Dato’ Hamzah Abdullah]{tokoh} – Orang Kaya Menteri Besar Selangor'
      - '[person] 3. [Haji Mohamad Sheriff Osman]{tokoh} – Setiausaha Kerajaan Kedah'
      - '[person] 4. [Dato’ Nik Ahmad Kamil Mahmud]{tokoh} – Dato’ Seri Setia Raja Kelantan'
    - tajuk: Pegawai pemerhati dan penasihat undang-undang
      senarai:
      - '[pushpin] Terdapat juga pegawai pemerhati dan penasihat undang-undang dalam [Jawatankuasa Kerja]{pertubuhan}, iaitu:'
      - '[person] 1. [Theodore Adams]{tokoh} – Penasihat Raja-raja Melayu'
      - '[person] 2. [Roland Braddell]{tokoh} – Penasihat Undang-undang UMNO'
      - '[person] 3. [Ralph Hone]{tokoh} – Pemerhati dan wakil Gabenor Jeneral'
