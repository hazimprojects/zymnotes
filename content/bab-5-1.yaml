- tajuk: Cadangan PUTERA-AMCJA dan Perlembagaan Rakyat
  label: Bahagian Keenam
  desc: ''
  kandungan:
  - jenis: board
    tajuk: ''
    strip: false
    senarai:
    - '[classical_building] [UMNO]{pertubuhan}'
    - '[crown] [Raja-raja Melayu]{tokoh}'
    - '[globe_meridians] [British]{pertubuhan}'
  - jenis: board
    tajuk: Info
    strip: true
    senarai:
    - '[factory] kilang'
    - '[convenience-store] kedai'
    - '[school] sekolah'
    - '[office-building] pejabat'
    - '[herb] ladang'
  - jenis: accordion
    items:
    - tajuk: Cadangan PUTERA
      senarai:
      - '[pushpin] Cadangan [PUTERA]{pertubuhan} meliputi:'
      - '[speaking_head] kedudukan [Bahasa Melayu]{istilah}'
      - '[shield] pertahanan dan hal ehwal luar negeri'
      - '[identification-card] syarat kewarganegaraan Tanah Melayu'
      - '[triangular-flag] bendera dan lagu kebangsaan'
    - tajuk: Cadangan AMCJA
      senarai:
      - '[pushpin] Cadangan [AMCJA]{pertubuhan} meliputi:'
      - '[map] penyatuan Tanah Melayu dengan [Singapura]{tempat}'
      - '[classical_building] sebuah kerajaan pusat yang kuat'
      - '[crown] [Raja-raja Melayu]{tokoh} sebagai Raja Berperlembagaan'
      - '[chart] kemajuan politik dan ekonomi orang Melayu'
      - '[mosque] adat istiadat dan agama Islam'
      - '[identification-card] syarat kewarganegaraan'
    - tajuk: Pembentukan Perlembagaan Rakyat
      senarai:
      - '[calendar] [Akhir Mac 1947]{masa} → cadangan [PUTERA]{pertubuhan} dan [AMCJA]{pertubuhan} digabungkan untuk membentuk
        [Perlembagaan Rakyat]{perjanjian}.'
      - '[calendar] [Julai 1947]{masa} → [PUTERA-AMCJA]{pertubuhan} mengadakan pertemuan untuk mengemukakan draf [Perlembagaan
        Rakyat]{perjanjian}.'
    - tajuk: Kandungan Perlembagaan Rakyat
      senarai:
      - '[pushpin] Antara kandungannya ialah:'
      - '[keycap_1] Tanah Melayu disatukan dengan [Singapura]{tempat}'
      - '[keycap_2] Penubuhan sebuah Dewan Perundangan Pusat dan majlis-majlis negeri yang dipilih bagi seluruh Tanah Melayu'
      - '[keycap_3] Kewarganegaraan yang sama bagi semua orang yang menganggap Tanah Melayu sebagai tempat tinggal tetap dan
        sanggup mencurahkan kesetiaan tanpa berbelah bahagi'
      - '[keycap_4] [Raja-raja Melayu]{tokoh} sebagai Raja Berperlembagaan yang bertanggungjawab kepada rakyat dan menerima
        nasihat melalui Majlis Mesyuarat'
      - '[keycap_5] Hal ehwal agama Islam dan adat istiadat Melayu diketuai sepenuhnya oleh orang Melayu melalui Majlis Khas'
      - '[keycap_6] Perhatian khas hendaklah diberikan kepada kemajuan politik dan ekonomi orang Melayu'
      - '[keycap_7] [Bahasa Melayu]{istilah} hendaklah menjadi bahasa kebangsaan dan bahasa rasmi yang tunggal bagi Tanah
        Melayu'
      - '[keycap_8] Hal ehwal luar negeri dan pertahanan hendaklah menjadi tanggungjawab bersama kerajaan Tanah Melayu dan
        kerajaan British'
      - '[keycap_9] Kewarganegaraan Malaya haruslah dinamakan Melayu'
      - '[keycap-10] Warna merah dan putih harus dimasukkan sebagai latar belakang bendera kebangsaan Tanah Melayu'
    - tajuk: Reaksi British terhadap Perlembagaan Rakyat
      senarai:
      - '[pushpin] British menolak [Perlembagaan Rakyat]{perjanjian} dan menerima [Perjanjian Persekutuan Tanah Melayu]{perjanjian}
        yang digubal oleh [Jawatankuasa Kerja]{pertubuhan}.'
    - tajuk: Hartal PUTERA-AMCJA
      senarai:
      - '[pushpin] Dengan sokongan [Dewan Perniagaan Cina]{pertubuhan}, hartal dilaksanakan di bandar utama di Tanah Melayu.'
      - '[calendar] [20 September 1947]{masa} → [PUTERA-AMCJA]{pertubuhan} menganjurkan [hartal]{istilah} dan semua peniaga
        diminta menutup kedai sebagai tanda bantahan.'
      - '[calendar] [20 Oktober 1947]{masa} → dipilih sebagai [Hari Hartal Se-Malaya]{istilah}.'
kesimpulan:
- '[pushpin] Penubuhan [Persekutuan Tanah Melayu 1948]{pentadbiran} bermula dengan usaha British menubuhkan [Jawatankuasa
  Kerja]{pertubuhan} bagi menggantikan [Malayan Union]{pentadbiran} yang ditolak oleh rakyat.'
- '[pushpin] Namun, [Jawatankuasa Kerja]{pertubuhan} tidak diterima oleh golongan nasionalis Melayu radikal dan bukan Melayu
  kerana:'
- '[pushpin] Oleh itu, gabungan [PUTERA-AMCJA]{pertubuhan} mengemukakan [Perlembagaan Rakyat]{perjanjian} sebagai cadangan
  alternatif.'
- '[light_bulb] Walaupun cadangan ini ditolak oleh British, perjuangan mereka membuktikan bahawa pelbagai golongan rakyat
  telah mula memikirkan bentuk negara merdeka yang lebih adil, demokratik dan menyeluruh.'
- '[warning] tidak melibatkan semua pihak'
- '[warning] dianggap tidak demokratik'
- '[warning] dilihat mengukuhkan kuasa British'
