<svg viewBox="0 0 260 72" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Hazim EduHub">

  <!-- Icon mark (72×72) -->
  <rect x="0" y="0" width="72" height="72" rx="16" fill="#2f7a67"/>
  <!-- Left page -->
  <rect x="13" y="17" width="9.5" height="38" rx="2.2" fill="white"/>
  <!-- Right page -->
  <rect x="49.5" y="17" width="9.5" height="38" rx="2.2" fill="white"/>
  <!-- Arched crossbar -->
  <path d="M22.5 32 Q36 27.5 49.5 32 L49.5 40 Q36 35.5 22.5 40 Z" fill="white"/>
  <!-- Spark dots -->
  <circle cx="36" cy="14.5" r="2.4" fill="rgba(255,255,255,0.52)"/>
  <circle cx="42"  cy="11"  r="1.5" fill="rgba(255,255,255,0.32)"/>
  <circle cx="30"  cy="11"  r="1.5" fill="rgba(255,255,255,0.32)"/>

  <!-- Wordmark -->
  <!-- "Hazim" — darker weight -->
  <text x="88" y="34"
        font-family="Nunito,system-ui,sans-serif"
        font-size="22"
        font-weight="800"
        fill="#1e2a34"
        letter-spacing="-0.3">Hazim</text>
  <!-- "EduHub" — teal, lighter -->
  <text x="88" y="58"
        font-family="Nunito,system-ui,sans-serif"
        font-size="17"
        font-weight="700"
        fill="#2f7a67"
        letter-spacing="0.2">EduHub</text>

  <!-- Dot separator between lines -->
  <circle cx="82" cy="46" r="1.8" fill="#d4c9b0"/>
</svg>
